###############################################################################
#  Snapmaker J1 — Filament Motion Sensor via ADC
#
#  Two separate detection loops, selected at print start by START_PRINT:
#
#  COPYMIRROR_RUNOUT  — Copy and Mirror modes
#    Both carriages move simultaneously and extrude identically.
#    A single shared E-position delta drives the check window.
#    Both extruders are monitored every cycle.
#    On runout, always calls PAUSE (backup switching is not supported in
#    COPY/MIRROR — switching to one nozzle mid-print leaves the other side
#    of the model incomplete).
#
#  IDEX_RUNOUT        — Single-extruder and dual-tool IDEX modes
#    Only the currently active extruder (printer.toolhead.extruder) is
#    checked each cycle.  Each extruder has its own position baseline and
#    ADC reference so tool-changes don't corrupt the other channel's state.
#    Works correctly for T0-only, T1-only, and alternating T0/T1 IDEX prints.
#    On runout, calls _BACKUP_SWITCH if backup mode is armed (see idex.cfg),
#    otherwise calls PAUSE.
#
#  START_PRINT arms exactly one loop and stores which one it started in
#  _FILAMENT_VARS.active_loop so PAUSE/RESUME/CANCEL can stop/restart the
#  correct delayed_gcode without hardcoding the ID everywhere.
###############################################################################

# ─────────────────────────────────────────────────────────────────────────────
# 1.  ADC sensors
#
#     The adc_temperature map scales 0–3.3 V directly to 0–4095, matching the
#     12-bit ADC resolution.  Klipper reports this as "temperature", so reading
#     printer["temperature_sensor _filament_e0_adc"].temperature | int gives a
#     raw ADC count in the range 0–4095 with no further scaling required.
# ─────────────────────────────────────────────────────────────────────────────

[adc_temperature filament_adc_map]
temperature1: 0
voltage1: 0.0
temperature2: 4095
voltage2: 3.3

[temperature_sensor _filament_e0_adc]
sensor_type: filament_adc_map
sensor_pin: PA4
adc_voltage: 3.3
min_temp: -1
max_temp: 5000

[temperature_sensor _filament_e1_adc]
sensor_type: filament_adc_map
sensor_pin: PA0
adc_voltage: 3.3
min_temp: -1
max_temp: 5000

# ─────────────────────────────────────────────────────────────────────────────
# 2.  Shared variables
# ─────────────────────────────────────────────────────────────────────────────

[gcode_macro _FILAMENT_VARS]
description: Internal filament sensor state — do not call directly
# Which loop is currently armed: 'COPYMIRROR', 'IDEX', or 'NONE'
variable_active_loop:   'NONE'
# Per-extruder last ADC counts (raw 0–4095)
variable_last_adc_e0:   0
variable_last_adc_e1:   0
# Per-extruder last E-axis position baselines (mm)
variable_last_pos_e0:   0.0
variable_last_pos_e1:   0.0
# Shared position baseline used by COPYMIRROR loop
variable_last_pos_e:    0.0
# Consecutive error counters
variable_err_count_e0:  0
variable_err_count_e1:  0
# Trigger flag — set 1 when PAUSE fires; cleared on RESUME
variable_triggered:     0
# Total extruded distance counters (mm) — informational only
variable_total_mm_e0:   0.0
variable_total_mm_e1:   0.0
# Filament density (g/cm³) — override from START_PRINT per material; PLA default
variable_density_t0:    1.24
variable_density_t1:    1.24
# ── Tuneable parameters ───────────────────────────────────────────────────
variable_threshold:      10    # Min ADC delta to count as filament moving
variable_max_errors:      3    # Consecutive failures before PAUSE
variable_check_distance:  1.0  # Min extrusion (mm) between ADC comparisons
gcode:
  # Storage macro only — no direct action

# ─────────────────────────────────────────────────────────────────────────────
# 3.  COPYMIRROR_RUNOUT
#     Copy and Mirror modes only.
#     Both nozzles extrude identically; one shared position delta drives the
#     check window and both ADC channels are evaluated every cycle.
#
#     Backup switching is intentionally NOT supported here — in COPY/MIRROR
#     mode both carriages print the same geometry simultaneously; switching to
#     a single nozzle mid-print would leave one copy incomplete.  Always PAUSE.
# ─────────────────────────────────────────────────────────────────────────────

[delayed_gcode COPYMIRROR_RUNOUT]
initial_duration: 0
gcode:
  {% set vars = printer["gcode_macro _FILAMENT_VARS"] %}

  {% if not vars.triggered and printer.print_stats.state == "printing" %}

    {% set e0_adc   = printer["temperature_sensor _filament_e0_adc"].temperature | int %}
    {% set e1_adc   = printer["temperature_sensor _filament_e1_adc"].temperature | int %}
    {% set cur_pos  = printer.gcode_move.gcode_position.e | float %}
    {% set delta_mm = cur_pos - vars.last_pos_e %}

    {% if delta_mm >= vars.check_distance %}
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e0 VALUE={vars.total_mm_e0 + delta_mm}
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e1 VALUE={vars.total_mm_e1 + delta_mm}
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e VALUE={cur_pos}

      # FIX (Jinja2 scope): trigger_pause/msg Jinja2 variables set inside inner
      # {% if %} blocks are NOT visible outside those blocks in Klipper's Jinja2.
      # Each sensor triggers inline and independently.
      #
      # FIX (ADC freeze): last_adc is only updated when motion is confirmed
      # (diff >= threshold). When an error is registered the baseline stays frozen
      # so the NEXT cycle still compares against the same reference, allowing the
      # error counter to accumulate correctly.
      #
      # FIX (E1 guard): vars.triggered is a snapshot taken at macro-render start
      # and cannot reflect a SET_GCODE_VARIABLE written in the E0 block above.
      # A namespace() object IS mutable across Jinja2 block scopes (Python Jinja2).
      # ns.fired tracks an intra-cycle E0 trigger so E1 is skipped if E0 already
      # fired, preventing a double-PAUSE when both sensors fail simultaneously.
      {% set ns = namespace(fired=false) %}

      # ── E0 ────────────────────────────────────────────────────────────────
      {% set diff_e0 = (e0_adc - vars.last_adc_e0) | abs %}
      {% if diff_e0 < vars.threshold %}
        {% set new_err_e0 = vars.err_count_e0 + 1 %}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE={new_err_e0}
        {% if new_err_e0 >= vars.max_errors %}
          {% set ns.fired = true %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered    VALUE=1
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
          {action_respond_info("FILAMENT SENSOR [COPY/MIRROR]: Left (E0) jammed/absent — pausing!")}
          PAUSE
        {% endif %}
        # last_adc_e0 intentionally NOT updated — baseline frozen during error streak
      {% else %}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e0 VALUE={e0_adc}
      {% endif %}

      # ── E1 ────────────────────────────────────────────────────────────────
      # ns.fired is visible here — namespace() propagates across Jinja2 blocks.
      {% if not ns.fired %}
        {% set diff_e1 = (e1_adc - vars.last_adc_e1) | abs %}
        {% if diff_e1 < vars.threshold %}
          {% set new_err_e1 = vars.err_count_e1 + 1 %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE={new_err_e1}
          {% if new_err_e1 >= vars.max_errors %}
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered    VALUE=1
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
            {action_respond_info("FILAMENT SENSOR [COPY/MIRROR]: Right (E1) jammed/absent — pausing!")}
            PAUSE
          {% endif %}
          # last_adc_e1 intentionally NOT updated — baseline frozen during error streak
        {% else %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e1 VALUE={e1_adc}
        {% endif %}
      {% endif %}

    {% elif delta_mm < 0 %}
      # E reset (retract / G92) — resync baseline without checking
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e VALUE={cur_pos}
    {% endif %}

  {% endif %}

  # Only reschedule if this mode is actually active
  {% if vars.active_loop == 'COPYMIRROR' %}
    UPDATE_DELAYED_GCODE ID=COPYMIRROR_RUNOUT DURATION=0.5
  {% endif %}

# ─────────────────────────────────────────────────────────────────────────────
# 4.  IDEX_RUNOUT
#     Single-extruder prints (T0 only or T1 only) AND
#     dual-tool IDEX prints (T0 + T1 alternating on one model).
#
#     Only the extruder reported by printer.toolhead.extruder is checked each
#     cycle — the idle one is ignored completely, so a hot-but-idle nozzle
#     never falsely accumulates errors.
#
#     Each extruder keeps its own position baseline (last_pos_e0 / last_pos_e1)
#     and its own ADC reference (last_adc_e0 / last_adc_e1).  A tool-change
#     with G92 E0 only resets the position on the newly active channel via the
#     delta < 0 resync path; the other channel is unaffected.
#
#     On runout, _BACKUP_SWITCH is called if backup mode is armed in idex.cfg
#     (IDEX_BACKUP was called at print start).  Otherwise PAUSE is called.
# ─────────────────────────────────────────────────────────────────────────────

[delayed_gcode IDEX_RUNOUT]
initial_duration: 0
gcode:
  {% set vars    = printer["gcode_macro _FILAMENT_VARS"] %}
  {% set active  = printer.toolhead.extruder %}
  {% set cur_pos = printer.gcode_move.gcode_position.e | float %}

  {% if not vars.triggered and printer.print_stats.state == "printing" %}

    {% if active == 'extruder' %}
      # ── Active: E0 ────────────────────────────────────────────────────────
      {% set delta_mm = cur_pos - vars.last_pos_e0 %}

      {% if delta_mm >= vars.check_distance %}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e0 VALUE={vars.total_mm_e0 + delta_mm}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e0 VALUE={cur_pos}
        {% set e0_adc  = printer["temperature_sensor _filament_e0_adc"].temperature | int %}
        {% set diff_e0 = (e0_adc - vars.last_adc_e0) | abs %}

        {% if diff_e0 < vars.threshold %}
          {% set new_err = vars.err_count_e0 + 1 %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE={new_err}
          {% if new_err >= vars.max_errors %}
            # Set triggered first so the loop halts before any carriage motion begins.
            # Clear the error counter immediately so it cannot carry over to the next
            # extruder if _BACKUP_SWITCH re-arms the sensor.
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered    VALUE=1
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
            {action_respond_info("FILAMENT SENSOR [IDEX]: Left (E0) jammed/absent — triggering action!")}
            {% if printer["gcode_macro _BACKUP_STATE"].enabled %}
              _BACKUP_SWITCH
            {% else %}
              PAUSE
            {% endif %}
          {% endif %}
          # last_adc_e0 intentionally NOT updated — baseline frozen during error streak
          # so the comparison reference stays stable and errors accumulate correctly.
        {% else %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e0 VALUE={e0_adc}
        {% endif %}

      {% elif delta_mm < 0 %}
        # E reset on this channel — resync without checking
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e0 VALUE={cur_pos}
      {% endif %}

    {% elif active == 'extruder1' %}
      # ── Active: E1 ────────────────────────────────────────────────────────
      {% set delta_mm = cur_pos - vars.last_pos_e1 %}

      {% if delta_mm >= vars.check_distance %}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e1 VALUE={vars.total_mm_e1 + delta_mm}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e1 VALUE={cur_pos}
        {% set e1_adc  = printer["temperature_sensor _filament_e1_adc"].temperature | int %}
        {% set diff_e1 = (e1_adc - vars.last_adc_e1) | abs %}

        {% if diff_e1 < vars.threshold %}
          {% set new_err = vars.err_count_e1 + 1 %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE={new_err}
          {% if new_err >= vars.max_errors %}
            # Same pattern as E0: halt loop first, clear count, then act.
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered    VALUE=1
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
            {action_respond_info("FILAMENT SENSOR [IDEX]: Right (E1) jammed/absent — triggering action!")}
            {% if printer["gcode_macro _BACKUP_STATE"].enabled %}
              _BACKUP_SWITCH
            {% else %}
              PAUSE
            {% endif %}
          {% endif %}
          # last_adc_e1 intentionally NOT updated — baseline frozen during error streak.
        {% else %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e1 VALUE={e1_adc}
        {% endif %}

      {% elif delta_mm < 0 %}
        # E reset on this channel — resync without checking
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e1 VALUE={cur_pos}
      {% endif %}

    {% endif %}
  {% endif %}
  # ONLY reschedule if this mode is actually active
  {% if vars.active_loop == 'IDEX' %}
    UPDATE_DELAYED_GCODE ID=IDEX_RUNOUT DURATION=0.5
  {% endif %}

# ─────────────────────────────────────────────────────────────────────────────
# 5.  Arm / disarm helpers
#     Called by START_PRINT, PAUSE, RESUME, and CANCEL_PRINT.
#     Always stop both loops before starting the intended one so a leftover
#     loop from a previous print never runs alongside the new one.
# ─────────────────────────────────────────────────────────────────────────────

[gcode_macro _FILAMENT_ARM_COPYMIRROR]
description: Arm the Copy/Mirror runout loop — call from START_PRINT
gcode:
  UPDATE_DELAYED_GCODE ID=IDEX_RUNOUT       DURATION=0
  UPDATE_DELAYED_GCODE ID=COPYMIRROR_RUNOUT DURATION=0

  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered    VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e   VALUE={printer.gcode_move.gcode_position.e | float}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e0  VALUE={printer["temperature_sensor _filament_e0_adc"].temperature | int}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e1  VALUE={printer["temperature_sensor _filament_e1_adc"].temperature | int}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=active_loop  VALUE='"COPYMIRROR"'

  UPDATE_DELAYED_GCODE ID=COPYMIRROR_RUNOUT DURATION=5.0
  {action_respond_info("Filament sensor: COPYMIRROR loop armed")}

[gcode_macro _FILAMENT_ARM_IDEX]
description: Arm the Single/IDEX runout loop — call from START_PRINT
gcode:
  UPDATE_DELAYED_GCODE ID=COPYMIRROR_RUNOUT DURATION=0
  UPDATE_DELAYED_GCODE ID=IDEX_RUNOUT       DURATION=0

  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered    VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e0  VALUE={printer.gcode_move.gcode_position.e | float}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e1  VALUE={printer.gcode_move.gcode_position.e | float}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e0  VALUE={printer["temperature_sensor _filament_e0_adc"].temperature | int}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e1  VALUE={printer["temperature_sensor _filament_e1_adc"].temperature | int}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=active_loop  VALUE='"IDEX"'

  UPDATE_DELAYED_GCODE ID=IDEX_RUNOUT DURATION=5.0
  {action_respond_info("Filament sensor: IDEX loop armed")}

[gcode_macro _FILAMENT_STOP]
description: Stop whichever runout loop is currently active
gcode:
  UPDATE_DELAYED_GCODE ID=COPYMIRROR_RUNOUT DURATION=0
  UPDATE_DELAYED_GCODE ID=IDEX_RUNOUT       DURATION=0
  {action_respond_info("Filament sensor: stopped")}

[gcode_macro _FILAMENT_RESUME_RESET]
description: Clear triggered state and restart the correct loop after RESUME
gcode:
  {% set vars = printer["gcode_macro _FILAMENT_VARS"] %}

  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered    VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0

  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e0  VALUE={printer["temperature_sensor _filament_e0_adc"].temperature | int}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e1  VALUE={printer["temperature_sensor _filament_e1_adc"].temperature | int}

  {% if vars.active_loop == 'COPYMIRROR' %}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e  VALUE={printer.gcode_move.gcode_position.e | float}
    UPDATE_DELAYED_GCODE ID=COPYMIRROR_RUNOUT DURATION=3.0
    {action_respond_info("Filament sensor: COPYMIRROR loop resumed")}
  {% elif vars.active_loop == 'IDEX' %}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e0 VALUE={printer.gcode_move.gcode_position.e | float}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e1 VALUE={printer.gcode_move.gcode_position.e | float}
    UPDATE_DELAYED_GCODE ID=IDEX_RUNOUT DURATION=3.0
    {action_respond_info("Filament sensor: IDEX loop resumed")}
  {% endif %}

# ─────────────────────────────────────────────────────────────────────────────
# 6.  User-facing commands
# ─────────────────────────────────────────────────────────────────────────────

[gcode_macro FILAMENT_STATUS]
description: Print current filament sensor state to the console
gcode:
  {% set vars   = printer["gcode_macro _FILAMENT_VARS"] %}
  {% set e0_adc = printer["temperature_sensor _filament_e0_adc"].temperature | int %}
  {% set e1_adc = printer["temperature_sensor _filament_e1_adc"].temperature | int %}
  # Gram estimate: cross-section of 1.75mm filament = π/4 × 1.75² mm² = 2.4053 mm²
  # Volume per mm length = 2.4053 mm³ = 0.0024053 cm³
  # Mass = volume × density
  {% set weight_e0 = vars.total_mm_e0 * 0.0024053 * vars.density_t0 %}
  {% set weight_e1 = vars.total_mm_e1 * 0.0024053 * vars.density_t1 %}
  {action_respond_info("==== FILAMENT SENSOR STATUS ====")}
  {action_respond_info("Active loop    : %s" % vars.active_loop)}
  {action_respond_info("Triggered      : %s" % ("YES - load filament then RESUME" if vars.triggered else "NO"))}
  {action_respond_info("--- Extruder 0 (T0) ---")}
  {action_respond_info("  Temp         : %.1f C" % printer["extruder"].temperature)}
  {action_respond_info("  Raw ADC      : %d" % e0_adc)}
  {action_respond_info("  ADC Diff     : %d  (threshold: %d)" % ((e0_adc - vars.last_adc_e0)|abs, vars.threshold))}
  {action_respond_info("  Errors       : %d / %d" % (vars.err_count_e0, vars.max_errors))}
  {action_respond_info("  Total        : %.1f mm  →  %.2f g (density=%.2f g/cm³)" % (vars.total_mm_e0, weight_e0, vars.density_t0))}
  {action_respond_info("--- Extruder 1 (T1) ---")}
  {action_respond_info("  Temp         : %.1f C" % printer["extruder1"].temperature)}
  {action_respond_info("  Raw ADC      : %d" % e1_adc)}
  {action_respond_info("  ADC Diff     : %d  (threshold: %d)" % ((e1_adc - vars.last_adc_e1)|abs, vars.threshold))}
  {action_respond_info("  Errors       : %d / %d" % (vars.err_count_e1, vars.max_errors))}
  {action_respond_info("  Total        : %.1f mm  →  %.2f g (density=%.2f g/cm³)" % (vars.total_mm_e1, weight_e1, vars.density_t1))}
  {% set total_mm = vars.total_mm_e0 + vars.total_mm_e1 %}
  {% set total_w  = weight_e0 + weight_e1 %}
  {action_respond_info("--- Grand Total ---")}
  {action_respond_info("  Total        : %.1f mm  →  %.2f g" % (total_mm, total_w))}

[gcode_macro FILAMENT_RESET_COUNTERS]
description: Reset extruded-distance and error counters to zero
gcode:
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e0  VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e1  VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
  {action_respond_info("Filament counters reset to zero")}

[gcode_macro FILAMENT_SET_THRESHOLD]
description: Adjust ADC motion threshold  (FILAMENT_SET_THRESHOLD V=20)
gcode:
  {% set V = params.V|default(15)|int %}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=threshold VALUE={V}
  {action_respond_info("Filament sensor threshold set to: %d" % V)}

[gcode_macro M412]
description: Standard filament sensor enable/disable (M412 S1 = enable, M412 S0 = disable)
gcode:
  {% set S = params.S|default(1)|int %}
  {% set vars = printer["gcode_macro _FILAMENT_VARS"] %}
  {% if S == 0 %}
    # Stop both loops immediately regardless of which is active
    _FILAMENT_STOP
    {action_respond_info("Filament sensor: DISABLED (M412 S0)")}
  {% else %}
    # Restart the loop that was armed at print start without resetting any state —
    # positions, ADC references, and counters are preserved so detection continues
    # cleanly from where it left off.  active_loop is not cleared by _FILAMENT_STOP
    # so it still holds the correct value here.
    {% if vars.active_loop == 'COPYMIRROR' %}
      UPDATE_DELAYED_GCODE ID=COPYMIRROR_RUNOUT DURATION=1.0
      {action_respond_info("Filament sensor: ENABLED — COPYMIRROR loop restarted (M412 S1)")}
    {% elif vars.active_loop == 'IDEX' %}
      UPDATE_DELAYED_GCODE ID=IDEX_RUNOUT DURATION=1.0
      {action_respond_info("Filament sensor: ENABLED — IDEX loop restarted (M412 S1)")}
    {% else %}
      {action_respond_info("Filament sensor: M412 S1 ignored — no loop armed yet (call from START_PRINT first)")}
    {% endif %}
  {% endif %}
