[adc_temperature filament_adc_map]
temperature1: 0
voltage1: 0.0
temperature2: 40.95
voltage2: 3.3

[temperature_sensor filament_e0_adc]
sensor_type: filament_adc_map
sensor_pin: PA4
adc_voltage: 3.3
min_temp: -1
max_temp: 50

[temperature_sensor filament_e1_adc]
sensor_type: filament_adc_map
sensor_pin: PA0
adc_voltage: 3.3
min_temp: -1
max_temp: 50

[gcode_macro _FILAMENT_VARS]
variable_enabled: 1
variable_triggered: 0
variable_last_adc_e0: 0
variable_last_adc_e1: 0
variable_last_pos_e0: 0.0
variable_last_pos_e1: 0.0
variable_total_mm_e0: 0.0
variable_total_mm_e1: 0.0
variable_err_count_e0: 0
variable_err_count_e1: 0
variable_threshold: 15
variable_max_errors: 2
variable_check_distance: 2.0
gcode:

[delayed_gcode CHECK_FILAMENT_MOTION]
initial_duration: 5.0
gcode:
  {% set vars = printer["gcode_macro _FILAMENT_VARS"] %}
  
  {% if vars.enabled and not vars.triggered and printer.print_stats.state == "printing" %}
    {% set cur_pos = printer.gcode_move.gcode_position.e|float %}
    {% set dual_mode = printer.dual_carriage.carriage_mode|default("PRIMARY") %}
    {% set check_e0 = False %}
    {% set check_e1 = False %}
    
    {% if dual_mode == "PRIMARY" %}
       {% if printer.toolhead.extruder == "extruder" %} {% set check_e0 = True %} {% else %} {% set check_e1 = True %} {% endif %}
    {% elif dual_mode in ["COPY", "MIRROR", "MULTIMACRO"] %}
       {% set check_e0 = True %}
       {% set check_e1 = True %}
    {% endif %}

    # --- E0 Logic ---
    {% if check_e0 %}
      {% set delta_e0 = (cur_pos - vars.last_pos_e0)|abs %}
      {% if delta_e0 >= vars.check_distance %}
        {% set adc_e0 = (printer["temperature_sensor filament_e0_adc"].temperature * 100)|int %}
        {% if (adc_e0 - vars.last_adc_e0)|abs < vars.threshold %}
          {% set new_err = vars.err_count_e0 + 1 %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE={new_err}
          {% if new_err >= vars.max_errors %}
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered VALUE=1
            {action_respond_info("FILAMENT SENSOR: E0 Jammed/Absent!")}
            PAUSE
          {% endif %}
        {% else %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e0 VALUE={cur_pos}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e0 VALUE={adc_e0}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e0 VALUE={vars.total_mm_e0 + delta_e0}
      {% endif %}
    {% else %}
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e0 VALUE={cur_pos}
    {% endif %}

    # --- E1 Logic ---
    {% if check_e1 %}
      {% set delta_e1 = (cur_pos - vars.last_pos_e1)|abs %}
      {% if delta_e1 >= vars.check_distance %}
        {% set adc_e1 = (printer["temperature_sensor filament_e1_adc"].temperature * 100)|int %}
        {% if (adc_e1 - vars.last_adc_e1)|abs < vars.threshold %}
          {% set new_err = vars.err_count_e1 + 1 %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE={new_err}
          {% if new_err >= vars.max_errors %}
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered VALUE=1
            {action_respond_info("FILAMENT SENSOR: E1 Jammed/Absent!")}
            PAUSE
          {% endif %}
        {% else %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e1 VALUE={cur_pos}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e1 VALUE={adc_e1}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e1 VALUE={vars.total_mm_e1 + delta_e1}
      {% endif %}
    {% else %}
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e1 VALUE={cur_pos}
    {% endif %}

  {% endif %}
  UPDATE_DELAYED_GCODE ID=CHECK_FILAMENT_MOTION DURATION=0.5

[gcode_macro M412]
gcode:
  {% set S = params.S|default(1)|int %}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=enabled VALUE={S}
  {% if S == 1 %}
    UPDATE_DELAYED_GCODE ID=CHECK_FILAMENT_MOTION DURATION=0.5
  {% else %}
    UPDATE_DELAYED_GCODE ID=CHECK_FILAMENT_MOTION DURATION=0
  {% endif %}

[gcode_macro FILAMENT_STATUS]
gcode:
  {% set vars = printer["gcode_macro _FILAMENT_VARS"] %}
  {action_respond_info("E0: %.1fmm, Err: %d | E1: %.1fmm, Err: %d" % (vars.total_mm_e0, vars.err_count_e0, vars.total_mm_e1, vars.err_count_e1))}

[gcode_macro FILAMENT_RESET_COUNTERS]
gcode:
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e0 VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e1 VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered VALUE=0