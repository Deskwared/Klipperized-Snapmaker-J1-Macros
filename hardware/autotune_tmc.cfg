[motor_constants snapmaker-jx-motor]
# Physical constants for the Snapmaker J1 high-torque motors
resistance: 1.45
inductance: 0.0021
holding_torque: 0.49
max_current: 2.0
steps_per_revolution: 200

[autotune_tmc stepper_x]
motor: snapmaker-jx-motor
tuning_goal: performance

[autotune_tmc stepper_y]
motor: snapmaker-jx-motor
tuning_goal: performance

[autotune_tmc stepper_z]
motor: snapmaker-jx-motor
tuning_goal: performance

[autotune_tmc extruder]
motor: snapmaker-jx-motor
tuning_goal: performance

[autotune_tmc extruder1]
motor: snapmaker-jx-motor
tuning_goal: performance