#############################################
# MCU Chamber Fan — Watermark control
# Fan ON at 35°C, OFF at 32°C (target=35, delta=3)
#############################################

[temperature_fan MCU]
pin: PC6                          # Verify physical wiring for this pin
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA2
min_temp: 0
max_temp: 60

# Trigger threshold and target
target_temp: 35                   # Fan activates at 35°C

control: watermark
max_delta: 3                      # Fan cuts out at 32°C (target - delta)

# PID alternative for progressive speed control (disabled)
#control: pid
#pid_Kp: 2.0
#pid_Ki: 0.5
#pid_Kd: 1.0
#pid_deriv_time: 2.0

# Speeds
max_speed: 1.0                    # 100% at full thermal load 
#min_speed: 0.15                   # Min speed when the fan is running (~15%) 
#off_below: 0.10                   # Below 10% duty → fan off 
kick_start_time: 0.5              # Brief startup pulse to ensure the fan spins

# Safety
shutdown_speed: 1.0               # Fan 100% in case of firmware shutdown 
#max_power: 1.0
