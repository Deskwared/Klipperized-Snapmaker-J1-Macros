# ═══════════════════════════════════════════════════
# DATUM CAVITY CALIBRATION HARDWARE CONFIG
# File location: hardware/probe_hardware.cfg
# ═══════════════════════════════════════════════════
[gcode_macro DATUM_POWER_ON]
gcode:
    SET_PIN PIN=probe_power VALUE=1

[gcode_macro DATUM_POWER_OFF]
gcode:
    SET_PIN PIN=probe_power VALUE=0

[output_pin probe_power]
pin: PD14
value: 0
shutdown_value: 0

# T0 datum pin registered as a background switch sensor for high-speed macro probing
[filament_switch_sensor datum_t0]
switch_pin: ^!PA7
pause_on_runout: False
event_delay: 0.001
runout_gcode:
insert_gcode:

# T1 datum pin registered as a background switch sensor for high-speed macro probing
[filament_switch_sensor datum_t1]
switch_pin: ^PE8
pause_on_runout: False
event_delay: 0.001
runout_gcode:
insert_gcode:

# All SAVE_VARIABLE calls in probe_calibration.cfg will correctly write to
# ~/printer_data/config/variables.cfg as defined in printer.cfg.
