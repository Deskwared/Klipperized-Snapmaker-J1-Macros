# ═══════════════════════════════════════════════════════════════
# IDEX Z OFFSET CALIBRATION VIA RIGHT DATUM POINT
# File location: macros/z_calibration.cfg
# ═══════════════════════════════════════════════════════════════

[gcode_macro _Z_DATUM_VARS]
variable_probe_x:       294.0   
variable_probe_y:         8.0   
variable_start_z:        -3.0   
variable_fast_step:       0.1
variable_slow_step:       0.02
variable_tolerance:       0.05
variable_travel_speed:   50.0   
variable_bed_thickness:   5.0   
variable_bed_temp:       60.0
variable_hotend_temp:   200.0
gcode:
    # Storage Only

[gcode_macro _Z_PROBE_STATE]
variable_current_toolhead: 0
variable_t0_baseline_z: 0.0
variable_last_hit_z: 0.0
variable_consecutive_matches: 0
variable_probe_phase: "fast"
variable_current_step: 0
variable_max_steps: 0
variable_initial_state: False
gcode:
    # Storage Only

# ── 2. DYNAMIC WORKFLOW ──
[gcode_macro Z_CALIBRATION_AUTO_PROBE]
description: Begins the iterative electrical tap sequence for T0 and T1
gcode:
    # 0. Drop Z to safe threshold and re-home X to reset kinematic bounds
    G90
    G0 Z30 F600
    G28 X
    
    # Guarantee clean mathematical origin
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    
    # Initialize State
    SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=current_toolhead VALUE=0
    SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=t0_baseline_z VALUE=0.0
    SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=last_hit_z VALUE=0.0
    
    RESPOND MSG="T0 initiating vertical datum seek..."
    M117 T0 Seeking Datum Pad...
          
     # Power up datum circuits centrally
    {% if 'gcode_macro DATUM_POWER_ON' in printer %}
        DATUM_POWER_ON
    {% endif %}

_START_Z_PROBE_CYCLE

[gcode_macro _START_Z_PROBE_CYCLE]
gcode:
    {% set v = printer["gcode_macro _Z_DATUM_VARS"] %}
    {% set state = printer["gcode_macro _Z_PROBE_STATE"] %}
    
    # Deploy correct carriage and LCD tracking based on active toolhead
    {% if state.current_toolhead == 0 %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        RESPOND MSG="Moving T0 to baseline pad..."
        M117 Probing T0 Baseline
    {% else %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        {% set shared_z_off = printer["gcode_macro Z_OFFSET"].t1|default(0) %}
        SET_GCODE_OFFSET X=0 Y=0 Z={shared_z_off}
        
        {% if state.last_hit_z != 0.0 %}
            M117 Pad Z:{state.last_hit_z|round(3)} Ref:{state.t0_baseline_z|round(3)}
        {% else %}
            M117 Ref:{state.t0_baseline_z|round(3)}
        {% endif %}
    {% endif %}

    # Move to the pad coordinate aggressively
    G90
    G1.1 Z5 F600
    G1.1 X{v.probe_x} Y{v.probe_y} F{v.travel_speed * 60}
    G1.1 Z{v.start_z} F600
    M400

    # Ensure electrical baseline capture
    {% if state.current_toolhead == 0 %}
        SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=initial_state VALUE={printer["filament_switch_sensor datum_t0"].filament_detected}
    {% else %}
        SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=initial_state VALUE={printer["filament_switch_sensor datum_t1"].filament_detected}
    {% endif %}

    # Sequence phase initiation
    SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=probe_phase VALUE='"fast"'
    SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=current_step VALUE=0
    SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=max_steps VALUE={(15.0 / v.fast_step)|int}
    
    UPDATE_DELAYED_GCODE ID=_Z_PROBE_POLL DURATION=0.1


[delayed_gcode _Z_PROBE_POLL]
gcode:
    {% set state = printer["gcode_macro _Z_PROBE_STATE"] %}
    {% set v = printer["gcode_macro _Z_DATUM_VARS"] %}
    
    {% if state.current_toolhead == 0 %}
        {% set current_state = printer["filament_switch_sensor datum_t0"].filament_detected %}
    {% else %}
        {% set current_state = printer["filament_switch_sensor datum_t1"].filament_detected %}
    {% endif %}
    
    {% set is_triggered = (current_state != state.initial_state) %}

    {% if is_triggered %}
        {% if state.probe_phase == "fast" %}
            # --- TRANSITION TO SLOW PROBE ---
            # Retract roughly 0.5mm
            G91
            G1.1 Z0.5 F300
            G90
            M400
            # Absolute physical stabilization pause
            G4 P200
            
            # Setup slow phase
            SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=probe_phase VALUE='"slow"'
            SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=current_step VALUE=0
            SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=max_steps VALUE={(2.0 / v.slow_step)|int}
            
            UPDATE_DELAYED_GCODE ID=_Z_PROBE_POLL DURATION=0.01

        {% elif state.probe_phase == "slow" %}
            # --- CONTACT IDENTIFIED ---
            {% set hit_z = printer.toolhead.position.z %}
            
            {% if state.current_toolhead == 0 %}
                # We have found the absolute baseline coordinate for T0
                {% set final_offset = hit_z + v.bed_thickness %}
                
                SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=t0_baseline_z VALUE={hit_z}
                RESPOND MSG="T0 Baseline established at absolute Z={hit_z|round(3)}"
                
                # Lock the mathematically shifted coordinate
                SET_GCODE_OFFSET Z={final_offset}
                SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t0 VALUE={final_offset}
                SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t1 VALUE={final_offset}
                
                # Retreat significantly, park T0
                {% set x_min = printer.configfile.settings.stepper_x.position_min %}
                G90
                G1.1 Z50 F600
                _IDEX_DECOUPLE
                SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
                G1.1 X{x_min} F12000
                
                # Update toolhead focus cleanly in state memory
                SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=current_toolhead VALUE=1
                SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=last_hit_z VALUE=0.0
                SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=consecutive_matches VALUE=0
                
                # Start T1 sequence dynamically
                UPDATE_DELAYED_GCODE ID=_RESTART_CYCLE_Z DURATION=0.5
                
            {% else %}
                # Analyzing T1 interactive screw polling!
                {% set baseline = state.t0_baseline_z %}
                
                # If this is the absolute first slow hit on this pad, init the variance tracking cleanly
                {% set valid_last_z = hit_z if state.last_hit_z == 0.0 else state.last_hit_z %}
                
                # Calculate differential absolute stability
                {% set variance = (hit_z - valid_last_z)|abs %}
                
                # Update visual graphics
                M117 Pad Z:{hit_z|round(3)} Ref:{baseline|round(3)}
                RESPOND MSG="Target T1 Reading -> Z: {hit_z|round(3)}   (T0 Reference: {baseline|round(3)})"
                
                {% if variance <= v.tolerance %}
                    # Screw hasn't moved
                    {% set new_wins = state.consecutive_matches + 1 %}
                    SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=consecutive_matches VALUE={new_wins}
                    
                    {% if new_wins >= 2 %}
                        RESPOND MSG=">>> T1 Stable Configuration Achieved at {hit_z|round(3)} <<<"
                        # Sweep upwards to 100 heavily and LEAVE IT active
                        G90
                        G1.1 Z100 F600
                        M400
                        
                        M117 T1 Trammed! Run Complete
                        RESPOND MSG="T1 is perfectly aligned physically to T0. Tighten nozzle bolts first, and then run Z_CALIBRATION_COMPLETE."
                    {% else %}
                        # Retract for next fast probe reading
                        SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=last_hit_z VALUE={hit_z}
                        G90
                        G1.1 Z{hit_z + 4.0} F300
                        UPDATE_DELAYED_GCODE ID=_RESTART_CYCLE_Z DURATION=0.5
                    {% endif %}
                    
                {% else %}
                    # Screw was turned, logic must adapt.
                    SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=consecutive_matches VALUE=0
                    SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=last_hit_z VALUE={hit_z}
                    
                    # Generous clearance retreat
                    G90
                    G1.1 Z{hit_z + 4.0} F300
                    
                    # Give human execution gap before falling back down
                    UPDATE_DELAYED_GCODE ID=_RESTART_CYCLE_Z DURATION=1.5
                {% endif %}
            {% endif %}
        {% endif %}
        
    {% elif state.current_step < state.max_steps %}
        # Kinetic Sub-level Increment Movement Structure
        {% set step_move = v.fast_step if state.probe_phase == "fast" else v.slow_step %}
        G91
        G1.1 Z-{step_move} F300
        G90
        # M400 guarantees precision syncing
        M400 
        
        SET_GCODE_VARIABLE MACRO=_Z_PROBE_STATE VARIABLE=current_step VALUE={state.current_step + 1}
        UPDATE_DELAYED_GCODE ID=_Z_PROBE_POLL DURATION=0.01
        
    {% else %}
        { action_raise_error("Vertical Sensor exhausted travel limitations without a circuit hit!") }
    {% endif %}

[delayed_gcode _RESTART_CYCLE_Z]
gcode:
    _START_Z_PROBE_CYCLE


# ── 3. FINALIZATION ──
[gcode_macro Z_CALIBRATION_COMPLETE]
description: Concludes the workflow, parks toolheads, and disables heaters.
gcode:
    # Kill any runaway listener buffers (legacy safety)
    UPDATE_DELAYED_GCODE ID=_Z_PROBE_POLL DURATION=0
    
    # Explicitly park T1 out of the way
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|default(0)|abs %}
    _IDEX_DECOUPLE
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G90
    G1.1 X{x_max - t1_x_off - 1} F12000
    
    # Restore T0 context cleanly
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    
    # Turn of datum power and heaters
    TURN_OFF_HEATERS
    {% if 'gcode_macro DATUM_POWER_OFF' in printer %}
        DATUM_POWER_OFF
    {% endif %}
    
    # Home all axes
    G28
    
    # Restore saved Z offsets from variables.cfg into RAM and apply to T0
    # This reinstates the user-saved offset, discarding the temporary calibration value
    {% set saved_t0 = printer.save_variables.variables.z_offset_t0 %}
    {% set saved_t1 = printer.save_variables.variables.z_offset_t1 %}
    SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t0 VALUE={saved_t0}
    SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t1 VALUE={saved_t1}
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={saved_t0}
    
    RESPOND MSG="=== IDEX AUTOMATED Z DIFFERENTIAL SEQUENCE COMPLETED ==="
    RESPOND MSG="Saved Z offset restored — T0={saved_t0} T1={saved_t1}"
    M117 Z Calibration Done!