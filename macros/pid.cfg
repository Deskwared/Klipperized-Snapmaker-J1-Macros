########################################
# PID CALIBRATION — Snapmaker J1 IDEX
#
# Carriage management mirrors NOZZLE_CLEAN_END park pattern:
#   - Offsets cleared before all moves
#   - _IDEX_DECOUPLE before carriage switching
#   - Inactive carriage parked safely before active carriage moves
#   - _HOMED.ready set to 1 so G1 Z guard does not block moves
#
# Usage:
#   PID_EXTRUDER          (defaults to 210°C)
#   PID_EXTRUDER TEMP=240
#   PID_EXTRUDER1         (defaults to 210°C)
#   PID_EXTRUDER1 TEMP=240
#   PID_BED               (defaults to 60°C)
#   PID_BED TEMP=80
#
# After any PID completes, tap "Save Config" in the
# KlipperScreen PID menu to write values and restart.
########################################

[gcode_macro PID_EXTRUDER]
description: PID calibration for T0 — parks T1 right, positions T0 at bed center
gcode:
    {% set TEMP     = params.TEMP|default(210)|float %}
    {% set x_min    = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max    = printer.configfile.settings.dual_carriage.position_max %}
    {% set x_center = (x_max + x_min) / 2 %}
    {% set y_center = printer.configfile.settings.stepper_y.position_max / 2 %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|abs %}
    {% set park_t1  = x_max - t1_x_off - 1 %}

    # Home if necessary
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # Allow G1 Z moves — we are homed
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=1

    G90

    # ── Step 1: Clear offsets and decouple carriages ──
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    _IDEX_DECOUPLE

    # ── Step 2: Park T1 safely on the right ──
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G1.1 Z50 F600
    G1.1 X{park_t1} F12000

    # ── Step 3: Move T0 to bed center ──
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G1.1 X{x_center} Y{y_center} F9000

    # ── Step 4: Run PID calibration ──
    IMP_LOG MSG="PID T0: heating to {TEMP}°C and calibrating..."
    PID_CALIBRATE HEATER=extruder TARGET={TEMP}

    # ── Step 5: Park T0 on the left when done ──
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G1.1 X{x_min} F12000

    IMP_LOG MSG="PID T0 complete — tap Save Config in KlipperScreen to save results"
    M117 PID T0 done! Save Config.


[gcode_macro PID_EXTRUDER1]
description: PID calibration for T1 — parks T0 left, positions T1 at bed center
gcode:
    {% set TEMP     = params.TEMP|default(210)|float %}
    {% set x_min    = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max    = printer.configfile.settings.dual_carriage.position_max %}
    {% set x_center = (x_max + x_min) / 2 %}
    {% set y_center = printer.configfile.settings.stepper_y.position_max / 2 %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|abs %}
    {% set park_t1  = x_max - t1_x_off - 1 %}

    # Home if necessary
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # Allow G1 Z moves — we are homed
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=1

    G90

    # ── Step 1: Clear offsets and decouple carriages ──
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    _IDEX_DECOUPLE

    # ── Step 2: Park T0 safely on the left ──
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G1.1 Z50 F600
    G1.1 X{x_min} F12000

    # ── Step 3: Move T1 to bed center ──
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G1.1 X{x_center} Y{y_center} F9000

    # ── Step 4: Run PID calibration ──
    IMP_LOG MSG="PID T1: heating to {TEMP}°C and calibrating..."
    PID_CALIBRATE HEATER=extruder1 TARGET={TEMP}

    # ── Step 5: Park T1 on the right when done ──
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G1.1 X{park_t1} F12000

    IMP_LOG MSG="PID T1 complete — tap Save Config in KlipperScreen to save results"
    M117 PID T1 done! Save Config.


[gcode_macro PID_BED]
description: PID calibration for the heated bed
gcode:
    {% set TEMP = params.TEMP|default(60)|float %}

    IMP_LOG MSG="PID Bed: heating to {TEMP}°C and calibrating..."
    PID_CALIBRATE HEATER=heater_bed TARGET={TEMP}

    IMP_LOG MSG="PID Bed complete — tap Save Config in KlipperScreen to save results"
    M117 PID Bed done! Save Config.
