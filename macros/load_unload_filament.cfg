########################################
# FILAMENT LOAD / UNLOAD — PRESET MACROS
# J1s IDEX — KlipperScreen filament menu
#
# Each macro:
#   1. Calls _FILAMENT_PARK_OTHER first (T0 macros check T1; T1 macros check T0)
#      to safely park and cool the other toolhead if a prior operation left it
#      unparked. BOTH macros skip this — they manage both carriages themselves.
#   2. Sets _FILAMENT_STATE so LOAD_UNLOAD_COMPLETE and EXTRUDE_MORE know which
#      toolhead(s) and temperature are active.
#   3. Calls LOAD_FILAMENT or UNLOAD_FILAMENT.
#
# The Y-forward park move has been removed from all macros here.
# It is performed exclusively by LOAD_UNLOAD_COMPLETE.
########################################

########################################
# T0 — LOAD
########################################

[gcode_macro LOAD_PLA_T0]
description: Load PLA into T0 at 210°C
gcode:
    _FILAMENT_PARK_OTHER T=0
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=active_t VALUE=0
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=target_temp VALUE=210
    LOAD_FILAMENT T=0 TEMP=210 X=180 Y=110 STAGE_ONLY=0

