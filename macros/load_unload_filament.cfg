########################################
# BOTH TOOLHEADS — LOAD
########################################

[gcode_macro LOAD_PLA_BOTH]
description: Load PLA into both toolheads (simultaneous staging and heating)
gcode:
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=active_t VALUE=2
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=target_temp VALUE=210
    M104.1 S210 T0    # non-blocking heat target T0
    M104.1 S210 T1    # non-blocking heat target T1
    LOAD_FILAMENT T=0 TEMP=210 X=165 Y=110 STAGE_ONLY=1  # Stage T0 to center
    LOAD_FILAMENT T=1 TEMP=210 X=191 Y=110 STAGE_ONLY=1  # Stage T1 to center alongside T0
    LOAD_FILAMENT T=0 TEMP=210 X=165 Y=110 STAGE_ONLY=0  # Wait, load, purge T0
    LOAD_FILAMENT T=1 TEMP=210 X=191 Y=110 STAGE_ONLY=0  # Wait, load, purge T1

[gcode_macro LOAD_TPU_BOTH]
description: Load TPU into both toolheads (simultaneous staging and heating)
gcode:
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=active_t VALUE=2
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=target_temp VALUE=220
    M104.1 S220 T0
    M104.1 S220 T1
    LOAD_FILAMENT T=0 TEMP=220 X=165 Y=110 STAGE_ONLY=1
    LOAD_FILAMENT T=1 TEMP=220 X=191 Y=110 STAGE_ONLY=1
    LOAD_FILAMENT T=0 TEMP=220 X=165 Y=110 STAGE_ONLY=0
    LOAD_FILAMENT T=1 TEMP=220 X=191 Y=110 STAGE_ONLY=0

[gcode_macro LOAD_PETG_BOTH]
description: Load PETG into both toolheads (simultaneous staging and heating)
