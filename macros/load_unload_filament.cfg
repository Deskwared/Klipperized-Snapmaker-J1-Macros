########################################
# FILAMENT LOAD / UNLOAD — PRESET MACROS
# J1s IDEX — KlipperScreen filament menu
#
# These macros are thin wrappers around LOAD_FILAMENT and UNLOAD_FILAMENT
# (defined in filament.cfg). Each one hardcodes the toolhead (T=) and
# temperature (TEMP=) for a specific filament type.
#
# Temperatures:
#   PLA     210°C
#   TPU     220°C
#   PETG    240°C
#   ABS/ASA 250°C
#
# All other parameters (LENGTH, PURGE, UNLOAD_LEN) inherit their
# defaults from the base macros in filament.cfg.
#
# NOTE: Toolhead identifier (T0/T1) is intentionally placed at the END
# of the macro name to avoid Klipper's GCode parser treating T0/T1 as
# a mid-name tool-change token and truncating the command.
########################################


########################################
# T0 — LOAD
########################################

[gcode_macro LOAD_PLA_T0]
description: Load PLA into T0 at 210°C
gcode:
    LOAD_FILAMENT T=0 TEMP=210

[gcode_macro LOAD_TPU_T0]
description: Load TPU into T0 at 220°C
gcode:
    LOAD_FILAMENT T=0 TEMP=220

[gcode_macro LOAD_PETG_T0]
description: Load PETG into T0 at 240°C
gcode:
    LOAD_FILAMENT T=0 TEMP=240

[gcode_macro LOAD_ABS_T0]
description: Load ABS/ASA into T0 at 250°C
gcode:
    LOAD_FILAMENT T=0 TEMP=250


########################################
# T1 — LOAD
########################################

[gcode_macro LOAD_PLA_T1]
description: Load PLA into T1 at 210°C
gcode:
    LOAD_FILAMENT T=1 TEMP=210

[gcode_macro LOAD_TPU_T1]
description: Load TPU into T1 at 220°C
gcode:
    LOAD_FILAMENT T=1 TEMP=220

[gcode_macro LOAD_PETG_T1]
description: Load PETG into T1 at 240°C
gcode:
    LOAD_FILAMENT T=1 TEMP=240

[gcode_macro LOAD_ABS_T1]
description: Load ABS/ASA into T1 at 250°C
gcode:
    LOAD_FILAMENT T=1 TEMP=250


########################################
# T0 — UNLOAD
########################################

[gcode_macro UNLOAD_PLA_T0]
description: Unload PLA from T0 at 210°C
gcode:
    UNLOAD_FILAMENT T=0 TEMP=210

[gcode_macro UNLOAD_TPU_T0]
description: Unload TPU from T0 at 220°C
gcode:
    UNLOAD_FILAMENT T=0 TEMP=220

[gcode_macro UNLOAD_PETG_T0]
description: Unload PETG from T0 at 240°C
gcode:
    UNLOAD_FILAMENT T=0 TEMP=240

[gcode_macro UNLOAD_ABS_T0]
description: Unload ABS/ASA from T0 at 250°C
gcode:
    UNLOAD_FILAMENT T=0 TEMP=250


########################################
# T1 — UNLOAD
########################################

[gcode_macro UNLOAD_PLA_T1]
description: Unload PLA from T1 at 210°C
gcode:
    UNLOAD_FILAMENT T=1 TEMP=210

[gcode_macro UNLOAD_TPU_T1]
description: Unload TPU from T1 at 220°C
gcode:
    UNLOAD_FILAMENT T=1 TEMP=220

[gcode_macro UNLOAD_PETG_T1]
description: Unload PETG from T1 at 240°C
gcode:
    UNLOAD_FILAMENT T=1 TEMP=240

[gcode_macro UNLOAD_ABS_T1]
description: Unload ABS/ASA from T1 at 250°C
gcode:
    UNLOAD_FILAMENT T=1 TEMP=250


########################################
# BOTH TOOLHEADS — LOAD
# Both heaters start simultaneously via M104.1 (non-blocking).
# Motion is still sequential — Klipper is single-threaded and
# cannot move both carriages at once. The M109.1 blocking wait
# inside LOAD_FILAMENT acts as a rendezvous: T0 waits for its
# temp, then loads; T1 is already at temp (or very close) by
# the time its turn arrives.
########################################

[gcode_macro LOAD_PLA_BOTH]
description: Load PLA into T0 then T1 at 210°C (heaters start simultaneously)
gcode:
    M104.1 S210 T0    # start T0 heating — non-blocking
    M104.1 S210 T1    # start T1 heating simultaneously — non-blocking
    LOAD_FILAMENT T=0 TEMP=210
    LOAD_FILAMENT T=1 TEMP=210

[gcode_macro LOAD_TPU_BOTH]
description: Load TPU into T0 then T1 at 220°C (heaters start simultaneously)
gcode:
    M104.1 S220 T0
    M104.1 S220 T1
    LOAD_FILAMENT T=0 TEMP=220
    LOAD_FILAMENT T=1 TEMP=220

[gcode_macro LOAD_PETG_BOTH]
description: Load PETG into T0 then T1 at 240°C (heaters start simultaneously)
gcode:
    M104.1 S240 T0
    M104.1 S240 T1
    LOAD_FILAMENT T=0 TEMP=240
    LOAD_FILAMENT T=1 TEMP=240

[gcode_macro LOAD_ABS_BOTH]
description: Load ABS/ASA into T0 then T1 at 250°C (heaters start simultaneously)
gcode:
    M104.1 S250 T0
    M104.1 S250 T1
    LOAD_FILAMENT T=0 TEMP=250
    LOAD_FILAMENT T=1 TEMP=250


########################################
# BOTH TOOLHEADS — UNLOAD
# Same simultaneous pre-heat strategy as LOAD above.
########################################

[gcode_macro UNLOAD_PLA_BOTH]
description: Unload PLA from T0 then T1 at 210°C (heaters start simultaneously)
gcode:
    M104.1 S210 T0
    M104.1 S210 T1
    UNLOAD_FILAMENT T=0 TEMP=210
    UNLOAD_FILAMENT T=1 TEMP=210

[gcode_macro UNLOAD_TPU_BOTH]
description: Unload TPU from T0 then T1 at 220°C (heaters start simultaneously)
gcode:
    M104.1 S220 T0
    M104.1 S220 T1
    UNLOAD_FILAMENT T=0 TEMP=220
    UNLOAD_FILAMENT T=1 TEMP=220

[gcode_macro UNLOAD_PETG_BOTH]
description: Unload PETG from T0 then T1 at 240°C (heaters start simultaneously)
gcode:
    M104.1 S240 T0
    M104.1 S240 T1
    UNLOAD_FILAMENT T=0 TEMP=240
    UNLOAD_FILAMENT T=1 TEMP=240

[gcode_macro UNLOAD_ABS_BOTH]
description: Unload ABS/ASA from T0 then T1 at 250°C (heaters start simultaneously)
gcode:
    M104.1 S250 T0
    M104.1 S250 T1
    UNLOAD_FILAMENT T=0 TEMP=250
    UNLOAD_FILAMENT T=1 TEMP=250
