    LOAD_FILAMENT T=1 TEMP=240 X=191 Y=110 STAGE_ONLY=1
    LOAD_FILAMENT T=0 TEMP=240 X=165 Y=110 STAGE_ONLY=0
    LOAD_FILAMENT T=1 TEMP=240 X=191 Y=110 STAGE_ONLY=0

