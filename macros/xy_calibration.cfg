# ═══════════════════════════════════════════════════════════════
# IDEX XY OFFSET CALIBRATION VIA DATUM CAVITY
# File location: macros/probe_calibration.cfg
# 
# Re-written to perform iterative micro-stepping probing since
# mainline Klipper PROBE strictly uses the Z axis and asynchronous
# macro orchestration requires state-machine sequencing.
# Probing moves are very slow, due to physical limitations on how the 
# commands are processed (e.g. start-stop-check every .05mm).
# ═══════════════════════════════════════════════════════════════

[gcode_macro _IDEX_CAVITY_VARS]
variable_cavity_x:          178.0   # approximate X center of cavity (machine coords)
variable_cavity_y:          102.0   # approximate Y center of cavity (machine coords)
variable_cavity_z:           -6.0   # Z height during probing (just above cavity floor)
variable_search_dist:        6.0   # max travel from center to find each wall (mm)
variable_step_size:           0.05  # incremental movement step (mm). Increasing this value will speed up the calibration but reduce accuracy.
variable_travel_speed:       50.0   # mm/s for rapid moves between touches
gcode:
    # Storage Only

[gcode_macro _OFFSET_RESULTS]
variable_y_pos: 0.0
variable_y_neg: 0.0
variable_x_pos: 0.0
variable_x_neg: 0.0
variable_t0_cx: 0.0
variable_t0_cy: 0.0
variable_t1_cx: 0.0
variable_t1_cy: 0.0
gcode:

[gcode_macro _PROBE_STATE]
variable_current_toolhead: 0
variable_current_wall: "Y+"
gcode:

# ── MAIN CALIBRATION ENTRY POINT ────────────────────────────────

[gcode_macro CALIBRATE_XY_AUTO_PROBE]
description: Full IDEX XY offset calibration using datum cavity
gcode:
    M117 Center Cavity Probing...
    RESPOND MSG="=== IDEX Datum Cavity Calibration ==="
    
     # Power up datum circuits centrally
    {% if 'gcode_macro DATUM_POWER_ON' in printer %}
        DATUM_POWER_ON
    {% endif %}
    # 0. Drop Z to safe threshold and re-home X to reset kinematic bounds
    G90
    G0 Z30 F600
    G28 X
    
    # 1. Initialize State Machine
    SET_GCODE_VARIABLE MACRO=_PROBE_STATE VARIABLE=current_toolhead VALUE=0
    SET_GCODE_VARIABLE MACRO=_PROBE_STATE VARIABLE=current_wall VALUE='"Y+"'
    
    # 4. Begin Sequence
    _START_TOOLHEAD_PROBE


# ── STATE MACHINE ORCHESTRATION ─────────────────────────────────
[gcode_macro _START_TOOLHEAD_PROBE]
gcode:
    {% set th = printer["gcode_macro _PROBE_STATE"].current_toolhead %}
    {% set v = printer["gcode_macro _IDEX_CAVITY_VARS"] %}
    
    RESPOND MSG="=== Probing Cavity with T{th} ==="
    
    # Clean decouple and activate target carriage
    _IDEX_DECOUPLE
    SET_DUAL_CARRIAGE CARRIAGE={th} MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER={'extruder' if th == 0 else 'extruder1'}
    
    # Reset toolhead internal offsets so coordinates are pure machine coordinates
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    # Rapid move to center point of the cavity
    G90
    G1.1 Z10 F600
    G1.1 X{v.cavity_x} Y{v.cavity_y} F{v.travel_speed * 60}
    
    # Lower nozzle into cavity
    G1.1 Z{v.cavity_z} F300

    # Start first wall sequence
    _PROBE_NEXT_WALL

[gcode_macro _PROBE_NEXT_WALL]
gcode:
    {% set wall = printer["gcode_macro _PROBE_STATE"].current_wall %}
    {% set th = printer["gcode_macro _PROBE_STATE"].current_toolhead %}
    {% set v = printer["gcode_macro _IDEX_CAVITY_VARS"] %}
    
    # Always ensure we restart from true center before probing each wall
    G90
    G1.1 X{v.cavity_x} Y{v.cavity_y} F{v.travel_speed * 60}
    M400
    
    # Schedule the initiation phase with an absolute delay. 
    # This mathematically guarantees the kinetic queue has drained and the hotend is resting 
    # precisely at the physical center *before* we establish the untriggered sensor baseline.
    UPDATE_DELAYED_GCODE ID=_START_WALL_PROBE DURATION=0.5

[delayed_gcode _START_WALL_PROBE]
gcode:
    {% set wall = printer["gcode_macro _PROBE_STATE"].current_wall %}
    {% set th = printer["gcode_macro _PROBE_STATE"].current_toolhead %}
    
    RESPOND MSG="T{th} - Establishing {wall} boundary..."
    HORIZONTAL_PROBE DIR={wall} T={th}

[gcode_macro _ADVANCE_WALL_STATE]
gcode:
    {% set ps = printer["gcode_macro _PROBE_STATE"] %}
    {% set r = printer["gcode_macro _OFFSET_RESULTS"] %}
    {% set v = printer["gcode_macro _IDEX_CAVITY_VARS"] %}
    
    # Step out to avoid dragging logic on the wall
    G90
    G1.1 X{v.cavity_x} Y{v.cavity_y} F{v.travel_speed * 60}

    # Evaluate Sequential Workflow
    {% if ps.current_wall == "Y+" %}
        SET_GCODE_VARIABLE MACRO=_PROBE_STATE VARIABLE=current_wall VALUE='"Y-"'
        _PROBE_NEXT_WALL
    {% elif ps.current_wall == "Y-" %}
        SET_GCODE_VARIABLE MACRO=_PROBE_STATE VARIABLE=current_wall VALUE='"X+"'
        _PROBE_NEXT_WALL
    {% elif ps.current_wall == "X+" %}
        SET_GCODE_VARIABLE MACRO=_PROBE_STATE VARIABLE=current_wall VALUE='"X-"'
        _PROBE_NEXT_WALL
    {% elif ps.current_wall == "X-" %}
        # Sequence complete for current toolhead
        {% set cx = ((r.x_pos + r.x_neg) / 2.0) %}
        {% set cy = ((r.y_pos + r.y_neg) / 2.0) %}
        
        RESPOND MSG="T{ps.current_toolhead} Cavity Center: X={cx|round(3)} Y={cy|round(3)}"
        
        {% if ps.current_toolhead == 0 %}
            # Save T0 geometry
            SET_GCODE_VARIABLE MACRO=_OFFSET_RESULTS VARIABLE=t0_cx VALUE={cx}
            SET_GCODE_VARIABLE MACRO=_OFFSET_RESULTS VARIABLE=t0_cy VALUE={cy}
            
            # Stage T1 Sequence
            SET_GCODE_VARIABLE MACRO=_PROBE_STATE VARIABLE=current_toolhead VALUE=1
            SET_GCODE_VARIABLE MACRO=_PROBE_STATE VARIABLE=current_wall VALUE='"Y+"'
            
            # Extract Z before swapping
            G1.1 Z10 F600
            
            # Unclutter work area by parking T0 prior to calling T1
            SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
            G1.1 X{printer.configfile.settings.stepper_x.position_min} F12000
            
            _START_TOOLHEAD_PROBE
        {% else %}
            # Save T1 geometry
            SET_GCODE_VARIABLE MACRO=_OFFSET_RESULTS VARIABLE=t1_cx VALUE={cx}
            SET_GCODE_VARIABLE MACRO=_OFFSET_RESULTS VARIABLE=t1_cy VALUE={cy}
            
            # Extract Z 
            G1.1 Z10 F600
            
            # Terminate and Calculate Sequence
            _FINALIZE_CALIBRATION
        {% endif %}
    {% endif %}

[gcode_macro _FINALIZE_CALIBRATION]
gcode:
    {% set r = printer["gcode_macro _OFFSET_RESULTS"] %}
    
    # T1 offset mathematically derived from the exact physical divergence between origin centers
    {% set offset_x = r.t1_cx - r.t0_cx %}
    {% set offset_y = r.t1_cy - r.t0_cy %}

    RESPOND MSG="Derived T1 Correction Offset - X={offset_x|round(3)} Y={offset_y|round(3)}"

    # Apply T1 contextual offset
    SET_DUAL_CARRIAGE CARRIAGE=1
    SET_GCODE_OFFSET X={offset_x} Y={offset_y} MOVE=0

    # Ensure T0 serves as Primary Control moving forward
    SET_DUAL_CARRIAGE CARRIAGE=0
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0|default(0)}
    ACTIVATE_EXTRUDER EXTRUDER=extruder

    # Save to Klipper variable persistence
    SAVE_VARIABLE VARIABLE=t1_x_offset VALUE={offset_x}
    SAVE_VARIABLE VARIABLE=t1_y_offset VALUE={offset_y}

    # Inject into live J1 Config state for active toolchanges (prevents slicer T1 overriding)
    {% if 'gcode_macro _J1_CONFIG' in printer %}
        SET_GCODE_VARIABLE MACRO=_J1_CONFIG VARIABLE=right_nozzle_adjust_x VALUE={offset_x}
        SET_GCODE_VARIABLE MACRO=_J1_CONFIG VARIABLE=right_nozzle_adjust_y VALUE={offset_y}
    {% endif %}

    {% if 'gcode_macro DATUM_POWER_OFF' in printer %}
        DATUM_POWER_OFF
    {% endif %}

    # Disable active heating
    TURN_OFF_HEATERS

    # Return all axes to their home positions
    G28

    M117 Calibration Complete!
    RESPOND MSG="=== System Offset Configuration Complete and Saved ==="


# ── HORIZONTAL ITERATIVE PROBING LOGIC ─────────────────────────────
[gcode_macro HORIZONTAL_PROBE]
variable_dir_x: 0.0
variable_dir_y: 0.0
variable_step_x: 0.0
variable_step_y: 0.0
variable_max_steps: 200
variable_current_step: 0
variable_toolhead: 0
variable_wall: ""
variable_initial_state: False
variable_phase: 0
gcode:
    {% set DIR = params.DIR|default("X+") %}
    {% set v = printer["gcode_macro _IDEX_CAVITY_VARS"] %}
    
    # Establish directional unit vectors
    {% if DIR == "X+" %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=dir_x VALUE=1.0
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=dir_y VALUE=0.0
    {% elif DIR == "X-" %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=dir_x VALUE=-1.0
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=dir_y VALUE=0.0
    {% elif DIR == "Y+" %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=dir_x VALUE=0.0
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=dir_y VALUE=1.0
    {% elif DIR == "Y-" %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=dir_x VALUE=0.0
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=dir_y VALUE=-1.0
    {% endif %}

    # Phase 0: Coarse Step = 0.2mm
    {% set course_step = 0.2 %}
    {% set max_course_steps = (v.search_dist / course_step)|int %}
    
    {% if DIR == "X+" %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_x VALUE={course_step}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_y VALUE=0.0
    {% elif DIR == "X-" %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_x VALUE={course_step * -1.0}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_y VALUE=0.0
    {% elif DIR == "Y+" %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_x VALUE=0.0
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_y VALUE={course_step}
    {% elif DIR == "Y-" %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_x VALUE=0.0
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_y VALUE={course_step * -1.0}
    {% endif %}

    # Stage state logic variables
    SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=phase VALUE=0
    SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=wall VALUE='"{DIR}"'
    SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=current_step VALUE=0
    SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=max_steps VALUE={max_course_steps}
    SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=toolhead VALUE={params.T|default(0)|int}

    # Log baseline states for both sensors at the neutral center.
    {% if params.T|default(0)|int == 0 %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=initial_state VALUE={printer["filament_switch_sensor datum_t0"].filament_detected}
    {% else %}
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=initial_state VALUE={printer["filament_switch_sensor datum_t1"].filament_detected}
    {% endif %}

    # Dispatch to asynchronous iterative loop
    UPDATE_DELAYED_GCODE ID=_PROBE_STEP DURATION=0.01

[delayed_gcode _PROBE_STEP]
gcode:
    {% set state = printer["gcode_macro HORIZONTAL_PROBE"] %}
    {% set is_triggered = false %}

    # 1. State Sensor Diagnostics
    {% if state.toolhead == 0 %}
        {% set current_state = printer["filament_switch_sensor datum_t0"].filament_detected %}
    {% else %}
        {% set current_state = printer["filament_switch_sensor datum_t1"].filament_detected %}
    {% endif %}
    
    {% set is_triggered = (current_state != state.initial_state) %}

    # 2. Logic Evaluation
    {% if is_triggered %}
        {% if state.phase == 0 %}
            # --- PHASE 0 TO 1 TRANSITION ---
            # Coarse Hit -> Retreat 1.0mm, Shift to Fine (Phase 1)
            {% set back_x = state.dir_x * -1.0 %}
            {% set back_y = state.dir_y * -1.0 %}
            
            G91
            G1.1 X{back_x} Y{back_y} F600
            G90
            M400
            
            # Setup Phase 1 variables (Fine Step = 0.05mm)
            {% set fine_step = 0.05 %}
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=phase VALUE=1
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_x VALUE={state.dir_x * fine_step}
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_y VALUE={state.dir_y * fine_step}
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=current_step VALUE=0
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=max_steps VALUE={(2.0 / fine_step)|int}
            
            UPDATE_DELAYED_GCODE ID=_PROBE_STEP DURATION=0.01

        {% elif state.phase == 1 %}
            # --- PHASE 1 TO 2 TRANSITION ---
            # Fine Hit -> Retreat 0.2mm, Shift to Ultra-Fine (Phase 2)
            {% set back_x = state.dir_x * -0.2 %}
            {% set back_y = state.dir_y * -0.2 %}
            
            G91
            G1.1 X{back_x} Y{back_y} F300
            G90
            M400
            
            # Setup Phase 2 variables (Ultra-Fine Step = 0.01mm)
            {% set ultra_step = 0.01 %}
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=phase VALUE=2
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_x VALUE={state.dir_x * ultra_step}
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=step_y VALUE={state.dir_y * ultra_step}
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=current_step VALUE=0
            SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=max_steps VALUE={(0.5 / ultra_step)|int}
            
            UPDATE_DELAYED_GCODE ID=_PROBE_STEP DURATION=0.01

        {% elif state.phase == 2 %}
            # --- PHASE 2 COMPLETION ---
            # Ultra-Fine Hit -> Register Contact
            {% set px = printer.toolhead.position.x %}
            {% set py = printer.toolhead.position.y %}
            
            # Write positional hits to results store
            {% if state.wall == "Y+" %}
                SET_GCODE_VARIABLE MACRO=_OFFSET_RESULTS VARIABLE=y_pos VALUE={py}
            {% elif state.wall == "Y-" %}
                SET_GCODE_VARIABLE MACRO=_OFFSET_RESULTS VARIABLE=y_neg VALUE={py}
            {% elif state.wall == "X+" %}
                SET_GCODE_VARIABLE MACRO=_OFFSET_RESULTS VARIABLE=x_pos VALUE={px}
            {% elif state.wall == "X-" %}
                SET_GCODE_VARIABLE MACRO=_OFFSET_RESULTS VARIABLE=x_neg VALUE={px}
            {% endif %}
            
            # Pass logic control back to orchestration loop
            _ADVANCE_WALL_STATE
        {% endif %}
        
    {% elif state.current_step < state.max_steps %}
        # Execute incremental kinetic shift
        G91
        G1.1 X{state.step_x} Y{state.step_y} F300
        G90
        # M400 is fundamental: It enforces queue synchronicity, guaranteeing physical completion before boolean logic re-evaluation
        M400 
        
        SET_GCODE_VARIABLE MACRO=HORIZONTAL_PROBE VARIABLE=current_step VALUE={state.current_step + 1}

        # Recursively callback delay loop
        UPDATE_DELAYED_GCODE ID=_PROBE_STEP DURATION=0.01
        
    {% else %}
        { action_raise_error("Horizontal probe critically exhausted bounds without physical collision trigger! Phase: " ~ state.phase) }
    {% endif %}

# ── RESTORE SAVED OFFSETS ON STARTUP ───────────────────────────
[gcode_macro IDEX_RESTORE_OFFSETS]
description: Re-applies saved T1 XY offsets after printer restart
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if 't1_x_offset' in svv and 't1_y_offset' in svv %}
        {% set ox = svv.t1_x_offset %}
        {% set oy = svv.t1_y_offset %}
        
        # Apply the loaded numerical offset geometry to carriage architecture
        SET_DUAL_CARRIAGE CARRIAGE=1
        SET_GCODE_OFFSET X={ox} Y={oy} MOVE=0
        
        # Inject into live J1 Config state for active toolchanges (prevents slicer T1 overriding)
        {% if 'gcode_macro _J1_CONFIG' in printer %}
            SET_GCODE_VARIABLE MACRO=_J1_CONFIG VARIABLE=right_nozzle_adjust_x VALUE={ox}
            SET_GCODE_VARIABLE MACRO=_J1_CONFIG VARIABLE=right_nozzle_adjust_y VALUE={oy}
        {% endif %}
        
        # Return focus to primary toolhead
        SET_DUAL_CARRIAGE CARRIAGE=0
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        RESPOND MSG="Restored T1 XY offsets - X={ox|round(3)} Y={oy|round(3)}"
    {% else %}
        RESPOND MSG="No saved T1 XY offsets found - run CALIBRATE_XY_OFFSETS first"
    {% endif %}
