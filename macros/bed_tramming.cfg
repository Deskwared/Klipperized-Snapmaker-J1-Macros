# ═══════════════════════════════════════════════════════════════
# IDEX BED TRAMMING WIZARD
# File location: macros/bed_tramming.cfg
# ═══════════════════════════════════════════════════════════════

[gcode_macro _TRAM_VARS]
variable_rear_x: 178.0
variable_rear_y: 189.0
variable_left_x: 64.0
variable_left_y: 8.0
variable_right_x: 294.0
variable_right_y: 8.0

variable_start_z: -3.0
variable_fast_step: 0.1
variable_slow_step: 0.02
variable_travel_speed: 50.0
variable_tolerance: 0.05
gcode:
    # Storage Only

[gcode_macro _TRAM_STATE]
variable_current_pad: "rear"
variable_rear_baseline_z: 0.0
variable_last_hit_z: 0.0
variable_consecutive_matches: 0
variable_probe_phase: "fast"
variable_current_step: 0
variable_max_steps: 0
variable_initial_state: False
gcode:
    # Storage Only

[gcode_macro BED_TRAMMING_AUTO_PROBE]
description: Interactive polling layout for manual bed screw tramming
gcode:
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        { action_raise_error("Must run Calibrations Prep before continuing.") }
    {% endif %}
    
    RESPOND MSG="=== Interactive Bed Tramming Initiated ==="
    M117 Prepping Tram...
    
     # Power up datum sensor circuits
    {% if 'gcode_macro DATUM_POWER_ON' in printer %}
        DATUM_POWER_ON
    {% endif %}
    # 0. Drop Z to safe threshold and re-home X to reset kinematic bounds
    G90
    G0 Z30 F600
    G28 X

    # Clear offsets and activate T0 exclusively
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    
    
    _IDEX_DECOUPLE
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder

    # Initialize probe state
    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=current_pad VALUE='"rear"'
    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=rear_baseline_z VALUE=0.0
    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=last_hit_z VALUE=0.0
    
    # Start the sequence
    _START_TRAM_PROBE_CYCLE
    
[gcode_macro _START_TRAM_PROBE_CYCLE]
gcode:
    {% set v = printer["gcode_macro _TRAM_VARS"] %}
    {% set state = printer["gcode_macro _TRAM_STATE"] %}
    
    # Retrieve coordinates based on active pad
    {% if state.current_pad == "rear" %}
        {% set px = v.rear_x %}
        {% set py = v.rear_y %}
        RESPOND MSG="Moving to REAR baseline pad..."
        M117 Probing Baseline Ctr
    {% elif state.current_pad == "left" %}
        {% set px = v.left_x %}
        {% set py = v.left_y %}
        {% if state.last_hit_z != 0.0 %}
            M117 Pad Z:{state.last_hit_z|round(3)} Ref:{state.rear_baseline_z|round(3)}
        {% else %}
            M117 Ref:{state.rear_baseline_z|round(3)}
        {% endif %}
    {% elif state.current_pad == "right" %}
        {% set px = v.right_x %}
        {% set py = v.right_y %}
        {% if state.last_hit_z != 0.0 %}
            M117 Pad Z:{state.last_hit_z|round(3)} Ref:{state.rear_baseline_z|round(3)}
        {% else %}
            M117 Ref:{state.rear_baseline_z|round(3)}
        {% endif %}
    {% endif %}

    # Move to pad position
    G90
    G1.1 Z5 F600
    G1.1 X{px} Y{py} F{v.travel_speed * 60}
    G1.1 Z{v.start_z} F600
    M400

    # Record initial sensor state
    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=initial_state VALUE={printer["filament_switch_sensor datum_t0"].filament_detected}

    # Begin fast probe phase
    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=probe_phase VALUE='"fast"'
    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=current_step VALUE=0
    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=max_steps VALUE={(15.0 / v.fast_step)|int}
    
    UPDATE_DELAYED_GCODE ID=_TRAM_POLL DURATION=0.1


[delayed_gcode _TRAM_POLL]
gcode:
    {% set state = printer["gcode_macro _TRAM_STATE"] %}
    {% set v = printer["gcode_macro _TRAM_VARS"] %}
    
    {% set current_state = printer["filament_switch_sensor datum_t0"].filament_detected %}
    {% set is_triggered = (current_state != state.initial_state) %}

    {% if is_triggered %}
        {% if state.probe_phase == "fast" %}
            # --- TRANSITION TO SLOW PROBE ---
            # Retract 0.5mm to reset contact
            G91
            G1.1 Z0.5 F300
            G90
            M400
            # Allow physical stabilization
            G4 P200
            
            # Begin slow probe phase
            SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=probe_phase VALUE='"slow"'
            SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=current_step VALUE=0
            SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=max_steps VALUE={(2.0 / v.slow_step)|int}
            
            UPDATE_DELAYED_GCODE ID=_TRAM_POLL DURATION=0.01

        {% elif state.probe_phase == "slow" %}
            # --- CONTACT IDENTIFIED ---
            {% set hit_z = printer.toolhead.position.z %}
            
            {% if state.current_pad == "rear" %}
                # Rear pad contact found — lock baseline, advance to left pad
                SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=rear_baseline_z VALUE={hit_z}
                RESPOND MSG="Baseline established at Z={hit_z|round(3)}"
                               
                # Advance to left pad
                SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=current_pad VALUE='"left"'
                SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=last_hit_z VALUE=0.0
                SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=consecutive_matches VALUE=0
                
                # Delay required — do not call macros directly after SET_GCODE_VARIABLE
                # if the called macro reads that variable within Jinja bounds
                UPDATE_DELAYED_GCODE ID=_RESTART_CYCLE_TRAM DURATION=0.5
                
            {% else %}
                # Left or right pad contact
                {% set baseline = state.rear_baseline_z %}
                
                # Use current hit as last_hit_z baseline if this is the first reading
                {% set valid_last_z = hit_z if state.last_hit_z == 0.0 else state.last_hit_z %}
                
                # Calculate Z variance from last reading
                {% set variance = (hit_z - valid_last_z)|abs %}
                
                # Update display
                M117 Pad Z:{hit_z|round(3)} Ref:{baseline|round(3)}
                RESPOND MSG="Target Pad Reading -> Z: {hit_z|round(3)}   (Reference Z: {baseline|round(3)})"
                
                {% if variance <= v.tolerance %}
                    # Screw hasn't moved
                    {% set new_wins = state.consecutive_matches + 1 %}
                    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=consecutive_matches VALUE={new_wins}
                    
                    {% if new_wins >= 2 %}
                        RESPOND MSG=">>> Pad {state.current_pad} Stable Configuration Achieved at {hit_z|round(3)} <<<"
                        # Sweep upwards heavily
                        G90
                        G1.1 Z20 F600
                        M400
                        
                        {% if state.current_pad == "left" %}
                            SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=current_pad VALUE='"right"'
                            SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=consecutive_matches VALUE=0
                            SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=last_hit_z VALUE=0.0
                            UPDATE_DELAYED_GCODE ID=_RESTART_CYCLE_TRAM DURATION=0.5
                        {% else %}
                            _TRAMMING_COMPLETE
                        {% endif %}
                    {% else %}
                        # Retract and re-probe — need 2 stable consecutive hits to confirm adjustment is complete
                        SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=last_hit_z VALUE={hit_z}
                        G90
                        G1.1 Z{hit_z + 4.0} F300
                        UPDATE_DELAYED_GCODE ID=_RESTART_CYCLE_TRAM DURATION=0.5
                    {% endif %}
                    
                {% else %}
                    # Screw was adjusted — reset and re-probe
                    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=consecutive_matches VALUE=0
                    SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=last_hit_z VALUE={hit_z}
                    
                    # Retract to give clearance
                    G90
                    G1.1 Z{hit_z + 4.0} F300
                    
                    # Delay to allow adjustment to complete
                    UPDATE_DELAYED_GCODE ID=_RESTART_CYCLE_TRAM DURATION=1.5
                {% endif %}
            {% endif %}
        {% endif %}
        
    {% elif state.current_step < state.max_steps %}
        # Step down incrementally
        {% set step_move = v.fast_step if state.probe_phase == "fast" else v.slow_step %}
        G91
        G1.1 Z-{step_move} F300
        G90
        # Wait for move to complete
        M400 
        
        SET_GCODE_VARIABLE MACRO=_TRAM_STATE VARIABLE=current_step VALUE={state.current_step + 1}
        UPDATE_DELAYED_GCODE ID=_TRAM_POLL DURATION=0.01
        
    {% else %}
        { action_raise_error("Tramming sensor exhausted vertical limitations without a circuit hit!") }
    {% endif %}

[delayed_gcode _RESTART_CYCLE_TRAM]
gcode:
    _START_TRAM_PROBE_CYCLE

[gcode_macro _TRAMMING_COMPLETE]
description: Gracefully exits loop and homes platform
gcode:
    RESPOND MSG="=== Interactive Platform Tramming Successful ==="
    M117 Tramming Finished!
    
    # Power circuit down locally
    {% if 'gcode_macro DATUM_POWER_OFF' in printer %}
        DATUM_POWER_OFF
    {% endif %}
    
    # Disable active heating
    TURN_OFF_HEATERS
    
    # Return heads to logical bounds
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G28
