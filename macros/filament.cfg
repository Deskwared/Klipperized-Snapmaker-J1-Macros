########################################
# FILAMENT LOADING / UNLOADING — J1s
#
# Usage:
#   LOAD_FILAMENT                     → loads active T0 at 230°C (default)
#   LOAD_FILAMENT   TEMP=220 T=1      → loads T1 at 220°C
#   UNLOAD_FILAMENT                   → unloads active T0 at 230°C (default)
#   UNLOAD_FILAMENT TEMP=220 T=1      → unloads T1 at 220°C
#
# Overridable parameters:
#   T=0|1          → target extruder (default: active)
#   TEMP=xxx       → temperature in °C (default: 230)
#   LENGTH=xxx     → loading length in mm (default: 60)
#   UNLOAD_LEN=xxx → unloading length in mm (default: 80)
#   PURGE=xxx      → final purge length in mm (default: 30)
#
# Default lengths calibrated for J1s (direct drive):
#   60mm  loading   — from sensor to the nozzle
#   80mm  unloading — nozzle + clean clearance out of the hotend
#   30mm  final purge — flushes old filament after loading
########################################


########################################
# INTERNAL MACRO — selects and prepares the correct extruder
########################################

[gcode_macro _FILAMENT_SELECT_EXTRUDER]
description: Selects and activates the target extruder for loading/unloading
gcode:
    {% set t = params.T|default(-1)|int %}

    # If T is not specified, use the active extruder
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}

    DBG_LOG MSG="Selecting extruder T{t} for filament"

    # Home if necessary
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        IMP_LOG MSG="Homing required before filament loading"
        G28
        G90
        G1.1 Z30 F600
    {% endif %}

    # Clean decoupling
    _IDEX_DECOUPLE

    {% if t == 0 %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
    {% else %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
    {% endif %}
    G92 E0


########################################
# FILAMENT LOADING
########################################

[gcode_macro LOAD_FILAMENT]
description: Loads filament into T0 or T1 with final purge.
# Usage: LOAD_FILAMENT [TEMP=230] [T=0|1] [LENGTH=60] [PURGE=30]
gcode:
    {% set temp       = params.TEMP|default(230)|float %}
    {% set t          = params.T|default(-1)|int %}
    {% set length     = params.LENGTH|default(60)|float %}
    {% set purge      = params.PURGE|default(30)|float %}
    {% set load_speed = 8 * 60 %}   # 8mm/s — slow load to avoid jams
    {% set purge_speed = 5 * 60 %}   # 5mm/s  — slow purge for a clean extrusion

    # Resolve actual extruder number
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}
  
    IMP_LOG MSG="LOAD_FILAMENT T{t} — heating to {temp}°C"

    # Select and prepare the extruder
    _FILAMENT_SELECT_EXTRUDER T={t}

    # Move nozzle off the silicone pad
    {% set x_offset = 10 if t == 0 else -10 %}
    G91
    G1.1 X{x_offset} F3000
    G90

    # Heat and wait
    M109.1 S{temp} T{t}
    IMP_LOG MSG="T{t} at temperature — filament insertion in progress"

    # Phase 1: fast load to the hotend
    M83
    G92 E0
    G1.1 E{length} F{load_speed}
    M400

    # Phase 2: final purge — flushes old filament
    IMP_LOG MSG="Final purge {purge}mm"
    G1.1 E{purge} F{purge_speed}
    M400

    # Light retraction to avoid oozing
    G1.1 E-2 F300
    M400
    G92 E0

    # Cool slightly to stop oozing
    M104.1 S{temp - 30} T{t}

    # Park extruder on pad to avoid oozing:
    {% set x_min = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|default(0)|float|abs %}

    G90 # Ensure absolute positioning
    {% if t == 0 %}
        G1.1 X{x_min} F12000
    {% else %}
        G1.1 X{x_max - t1_x_off - 1} F12000
    {% endif %}
    
    IMP_LOG MSG="LOAD T{t} complete — {length + purge}mm extruded"


########################################
# FILAMENT UNLOADING
########################################

[gcode_macro UNLOAD_FILAMENT]
description: Unloads filament from T0 or T1.
# Usage: UNLOAD_FILAMENT [TEMP=230] [T=0|1] [UNLOAD_LEN=80]
gcode:
    {% set temp         = params.TEMP|default(230)|float %}
    {% set t            = params.T|default(-1)|int %}
    {% set unload_len   = params.UNLOAD_LEN|default(80)|float %}
    {% set purge_before = 10 %}      # small purge before pulling — avoids jams
    {% set purge_speed  = 5 * 60 %}  # 5mm/s
    {% set retract_slow = 5 * 60 %}  # 5mm/s — slow initial retraction
    {% set retract_fast = 15 * 60 %} # 15mm/s — fast extraction from hotend

    # Resolve actual extruder number
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}

    IMP_LOG MSG="UNLOAD_FILAMENT T{t} — heating to {temp}°C"

    # Select and prepare the extruder
    _FILAMENT_SELECT_EXTRUDER T={t}

    # Move nozzle off the silicone pad
    {% set x_offset = 10 if t == 0 else -10 %}
    G91
    G1.1 X{x_offset} F3000
    G90

    # Heat and wait
    M109.1 S{temp} T{t}
    IMP_LOG MSG="T{t} at temperature — unloading in progress"

    M83
    G92 E0

    # Phase 1: small purge to soften and clear the nozzle
    IMP_LOG MSG="Pre-unload purge {purge_before}mm"
    G1.1 E{purge_before} F{purge_speed}
    M400

    # Phase 2: slow retraction to detach filament from hotend
    G1.1 E-15 F{retract_slow}
    M400

    # Phase 3: fast extraction out of the coldend
    G1.1 E-{unload_len} F{retract_fast}
    M400

    G92 E0

    # Turn off heating
    M104.1 S0 T{t}

    # Park extruder on pad to avoid oozing:
    {% set x_min = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|default(0)|float|abs %}

    G90 # Ensure absolute positioning
    {% if t == 0 %}
        G1.1 X{x_min} F12000
    {% else %}
        G1.1 X{x_max - t1_x_off - 1} F12000
    {% endif %}
    
    IMP_LOG MSG="UNLOAD T{t} complete — remove the filament"

