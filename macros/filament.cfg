########################################
# FILAMENT LOADING / UNLOADING — J1s
#
# Usage:
#   LOAD_FILAMENT                     → loads active T0 at 230°C (default)
#   LOAD_FILAMENT   TEMP=220 T=1      → loads T1 at 220°C
#   UNLOAD_FILAMENT                   → unloads active T0 at 230°C (default)
#   UNLOAD_FILAMENT TEMP=220 T=1      → unloads T1 at 220°C
#
# Overridable parameters:
#   T=0|1          → target extruder (default: active)
#   TEMP=xxx       → temperature in °C (default: 230)
#   LENGTH=xxx     → loading length in mm (default: 60)
#   UNLOAD_LEN=xxx → unloading length in mm (default: 80)
#   PURGE=xxx      → final purge length in mm (default: 30)
#   X=xxx          → absolute X staging coordinate
#   Y=xxx          → absolute Y staging coordinate
#   STAGE_ONLY=0|1 → if 1, exits immediately after reaching X/Y positioning
#
# After any load or unload, the nozzle(s) remain at the staging position and
# at target temperature until LOAD_UNLOAD_COMPLETE is called manually.
# EXTRUDE_MORE may be called any number of times before LOAD_UNLOAD_COMPLETE.
########################################


########################################
# FILAMENT STATE
# Stores active toolhead and target temperature so that LOAD_UNLOAD_COMPLETE
# and EXTRUDE_MORE know which extruder(s) to operate on and at what temperature.
# Written by preset macros in load_unload_filament.cfg before each operation.
#   active_t:    -1 = no active operation
#                 0 = T0 only
#                 1 = T1 only
#                 2 = Both toolheads
#   target_temp: temperature used for the current operation (0 when idle)
########################################

[gcode_macro _FILAMENT_STATE]
description: State container — holds active toolhead and temperature for LOAD_UNLOAD_COMPLETE and EXTRUDE_MORE
variable_active_t: -1
variable_target_temp: 0
gcode:
    # Not invoked directly


########################################
# PARK OTHER TOOLHEAD — safety guard for single-toolhead operations
#
# Called as the very first step of every T0-only and T1-only preset macro.
# If a prior filament operation left the OTHER toolhead at a staging position
# (LOAD_UNLOAD_COMPLETE was never fired), this macro parks and cools that
# toolhead before the new operation proceeds.
#
# Detection uses _FILAMENT_STATE.active_t as the proxy for park status:
#   T=0 operation starting: active_t==1 or active_t==2  →  T1 is unparked  →  park T1
#   T=1 operation starting: active_t==0 or active_t==2  →  T0 is unparked  →  park T0
#   active_t==-1                                         →  clean state, no action
#
# _FILAMENT_STATE is NOT cleared here. The SET_GCODE_VARIABLE lines in the
# calling preset macro (which execute immediately after this call returns)
# overwrite active_t and target_temp with the correct values for the new operation.
########################################

[gcode_macro _FILAMENT_PARK_OTHER]
description: Parks and cools the other toolhead if a prior operation left it unparked. T=0 checks T1; T=1 checks T0.
gcode:
    {% set t     = params.T|int %}
    {% set state = printer["gcode_macro _FILAMENT_STATE"] %}

    # --- T0 operation starting: park T1 if it was left unparked by a prior T1 or Both operation ---
    {% if t == 0 and (state.active_t == 1 or state.active_t == 2) %}
        WARN_LOG MSG="FILAMENT: T1 left unparked (active_t={state.active_t}) — parking and cooling T1 before T0 operation"
        {% set x_max    = printer.configfile.settings.dual_carriage.position_max %}
        {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|default(0)|float|abs %}
        _IDEX_DECOUPLE
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
        G92 E0
        G90
        M104.1 S0 T1
        G1.1 X{x_max - t1_x_off - 1} F12000
        INFO_LOG MSG="T1 parked and cooling"
    {% endif %}

    # --- T1 operation starting: park T0 if it was left unparked by a prior T0 or Both operation ---
    {% if t == 1 and (state.active_t == 0 or state.active_t == 2) %}
        WARN_LOG MSG="FILAMENT: T0 left unparked (active_t={state.active_t}) — parking and cooling T0 before T1 operation"
        {% set x_min = printer.configfile.settings.stepper_x.position_min %}
        _IDEX_DECOUPLE
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        G92 E0
        G90
        M104.1 S0 T0
        G1.1 X{x_min} F12000
        INFO_LOG MSG="T0 parked and cooling"
    {% endif %}


########################################
# INTERNAL MACRO — selects and prepares the correct extruder
########################################

[gcode_macro _FILAMENT_SELECT_EXTRUDER]
description: Selects and activates the target extruder for loading/unloading
gcode:
    {% set t = params.T|default(-1)|int %}

    # If T is not specified, use the active extruder
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}

    INFO_LOG MSG="Selecting extruder T{t} for filament loading"

    # Home if necessary
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        WARN_LOG MSG="Homing required before filament loading"
        G28
        G90
        G1.1 Z205 F600
    {% endif %}

    # Clean decoupling
    _IDEX_DECOUPLE

    {% if t == 0 %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
    {% else %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
    {% endif %}
    G92 E0


########################################
# FILAMENT LOADING
########################################

[gcode_macro LOAD_FILAMENT]
description: Loads filament into T0 or T1. Nozzle stays at staging position at target temperature until LOAD_UNLOAD_COMPLETE is called.
gcode:
    {% set temp       = params.TEMP|default(230)|float %}
    {% set t          = params.T|default(-1)|int %}
    {% set length     = params.LENGTH|default(60)|float %}
    {% set purge      = params.PURGE|default(30)|float %}
    {% set pos_x      = params.X|default(-1)|float %}
    {% set pos_y      = params.Y|default(-1)|float %}
    {% set stage_only = params.STAGE_ONLY|default(0)|int %}
    {% set load_speed  = 8 * 60 %}   # 8mm/s — slow load to avoid jams
    {% set purge_speed = 5 * 60 %}   # 5mm/s — slow purge for a clean extrusion

    # Resolve actual extruder number
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}

    # Select and prepare the extruder
    _FILAMENT_SELECT_EXTRUDER T={t}

    # Absolute positioning to custom coordinates if passed
    {% if pos_x != -1 and pos_y != -1 %}
        INFO_LOG MSG="Staging T{t} to absolute X{pos_x} Y{pos_y}"
        G90
        G1.1 X{pos_x} Y{pos_y} F12000
    {% else %}
        # Fallback: Move nozzle off the silicone pad relatively if no absolute coords passed
        {% set x_offset = 10 if t == 0 else -10 %}
        G91
        G1.1 X{x_offset} F3000
        G90
    {% endif %}

    # Only proceed with heating and extrusion if STAGE_ONLY is disabled
    {% if stage_only == 0 %}

        # Heat only if below target — proceed immediately if already at or above
        {% set extruder_name = 'extruder' if t == 0 else 'extruder1' %}
        M104.1 S{temp} T{t}
        {% if printer[extruder_name].temperature < temp %}
            INFO_LOG MSG="LOAD_FILAMENT T{t} — waiting for {temp}°C (currently {printer[extruder_name].temperature|int}°C)"
            M109.1 S{temp} T{t}
        {% else %}
            INFO_LOG MSG="LOAD_FILAMENT T{t} — already at {printer[extruder_name].temperature|int}°C — proceeding"
        {% endif %}
        INFO_LOG MSG="T{t} at temperature — loading filament"

        # Phase 1: fast load to the hotend
        M83
        G92 E0
        G1.1 E{length} F{load_speed}
        M400

        # Phase 2: final purge — flushes old filament
        INFO_LOG MSG="Final purge {purge}mm"
        G1.1 E{purge} F{purge_speed}
        M400

        # Light retraction to avoid oozing
        G1.1 E-2 F300
        M400
        G92 E0

        INFO_LOG MSG="LOAD T{t} complete — {length + purge}mm extruded — call LOAD_UNLOAD_COMPLETE when ready"
    {% endif %}


########################################
# FILAMENT UNLOADING
########################################

[gcode_macro UNLOAD_FILAMENT]
description: Unloads filament from T0 or T1. Nozzle stays at staging position at target temperature until LOAD_UNLOAD_COMPLETE is called.
gcode:
    {% set temp         = params.TEMP|default(230)|float %}
    {% set t            = params.T|default(-1)|int %}
    {% set unload_len   = params.UNLOAD_LEN|default(80)|float %}
    {% set pos_x        = params.X|default(-1)|float %}
    {% set pos_y        = params.Y|default(-1)|float %}
    {% set stage_only   = params.STAGE_ONLY|default(0)|int %}
    {% set purge_before = 10 %}      # small purge before pulling — avoids jams
    {% set purge_speed  = 5 * 60 %}  # 5mm/s
    {% set retract_slow = 5 * 60 %}  # 5mm/s — slow initial retraction
    {% set retract_fast = 15 * 60 %} # 15mm/s — fast extraction from hotend

    # Resolve actual extruder number
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}

    # Select and prepare the extruder
    _FILAMENT_SELECT_EXTRUDER T={t}

    # Absolute positioning to custom coordinates if passed
    {% if pos_x != -1 and pos_y != -1 %}
        INFO_LOG MSG="Staging T{t} to absolute X{pos_x} Y{pos_y}"
        G90
        G1.1 X{pos_x} Y{pos_y} F12000
    {% else %}
        # Fallback: Move nozzle off the silicone pad relatively if no absolute coords passed
        {% set x_offset = 10 if t == 0 else -10 %}
        G91
        G1.1 X{x_offset} F3000
        G90
    {% endif %}

    # Only proceed with heating and extraction if STAGE_ONLY is disabled
    {% if stage_only == 0 %}

        # Heat only if below target — proceed immediately if already at or above
        {% set extruder_name = 'extruder' if t == 0 else 'extruder1' %}
        M104.1 S{temp} T{t}
        {% if printer[extruder_name].temperature < temp %}
            INFO_LOG MSG="UNLOAD_FILAMENT T{t} — waiting for {temp}°C (currently {printer[extruder_name].temperature|int}°C)"
            M109.1 S{temp} T{t}
        {% else %}
            INFO_LOG MSG="UNLOAD_FILAMENT T{t} — already at {printer[extruder_name].temperature|int}°C — proceeding"
        {% endif %}
        INFO_LOG MSG="T{t} at temperature — unloading filament"

        M83
        G92 E0

        # Phase 1: small purge to soften and clear the nozzle
        INFO_LOG MSG="Pre-unload purge {purge_before}mm"
        G1.1 E{purge_before} F{purge_speed}
        M400

        # Phase 2: slow retraction to detach filament from hotend
        G1.1 E-15 F{retract_slow}
        M400

        # Phase 3: fast extraction out of the hotend
        G1.1 E-{unload_len} F{retract_fast}
        M400

        G92 E0

        INFO_LOG MSG="UNLOAD T{t} complete — remove filament — call LOAD_UNLOAD_COMPLETE when ready"
    {% endif %}


########################################
# LOAD / UNLOAD COMPLETE
#
# Called manually via KlipperScreen after confirming the filament operation
# is satisfactory. This is the ONLY macro that:
#   — cools the nozzle(s)
#   — parks the toolhead(s) to their side stations
#   — moves the Y axis forward
#   — clears _FILAMENT_STATE
#
# For t=0: T0 is the active carriage — cool and park T0, then move Y.
# For t=1: T1 is the active carriage — cool and park T1, then move Y.
# For t=2: T1 is the active carriage (last op was T1) — cool and park T1,
#          then switch to T0, cool and park T0, then move Y.
########################################

[gcode_macro LOAD_UNLOAD_COMPLETE]
description: Cool nozzles, park toolheads to side stations, and move Y forward. Call after confirming filament operation.
gcode:
    {% set state    = printer["gcode_macro _FILAMENT_STATE"] %}
    {% set t        = state.active_t %}

    {% if t == -1 %}
        WARN_LOG MSG="LOAD_UNLOAD_COMPLETE: No active filament operation — ignoring"
    {% else %}

        {% set x_min    = printer.configfile.settings.stepper_x.position_min %}
        {% set x_max    = printer.configfile.settings.dual_carriage.position_max %}
        {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|default(0)|float|abs %}

        G90

        # --- T1 only or Both: T1 is currently active — cool and park T1 first ---
        {% if t == 1 or t == 2 %}
            M104.1 S0 T1
            G1.1 X{x_max - t1_x_off - 1} F12000
        {% endif %}

        # --- T0 only: T0 is currently active — cool and park T0 ---
        {% if t == 0 %}
            M104.1 S0 T0
            G1.1 X{x_min} F12000
        {% endif %}

        # --- Both: switch to T0, then cool and park T0 ---
        {% if t == 2 %}
            _IDEX_DECOUPLE
            SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            SET_GCODE_OFFSET X=0 Y=0 Z=0
            G92 E0
            M104.1 S0 T0
            G1.1 X{x_min} F12000
        {% endif %}

        # Move Y forward — the only Y motion in the entire load/unload sequence
        G1.1 Y10 F12000

        INFO_LOG MSG="Filament operation complete — toolheads parked"

        # Clear state
        SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=active_t VALUE=-1
        SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=target_temp VALUE=0

    {% endif %}


########################################
# EXTRUDE MORE
#
# Extrudes 30mm from the active toolhead(s) to verify color or flow.
# Only extrudes if the nozzle is at or above the stored target temperature.
# May be called any number of times between a load/unload and LOAD_UNLOAD_COMPLETE.
#
# For t=0: T0 is active — extrude T0.
# For t=1: T1 is active — extrude T1.
# For t=2: T1 is active (last op was T1) — switch to T0, extrude T0,
#          then switch back to T1, extrude T1. Ends with T1 active,
#          consistent with what LOAD_UNLOAD_COMPLETE expects.
########################################

[gcode_macro EXTRUDE_MORE]
description: Extrudes 30mm from active toolhead(s) if at or above the load/unload target temperature.
gcode:
    {% set state       = printer["gcode_macro _FILAMENT_STATE"] %}
    {% set t           = state.active_t %}
    {% set temp        = state.target_temp %}
    {% set purge_len   = 30 %}
    {% set purge_speed = 5 * 60 %}  # 5mm/s

    {% if t == -1 or temp == 0 %}
        WARN_LOG MSG="EXTRUDE_MORE: No active filament operation — ignoring"
    {% else %}

        # --- Both: switch from T1 (currently active) to T0 first ---
        {% if t == 2 %}
            _IDEX_DECOUPLE
            SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            SET_GCODE_OFFSET X=0 Y=0 Z=0
            G92 E0
        {% endif %}

        # --- T0 only or Both: extrude from T0 ---
        {% if t == 0 or t == 2 %}
            {% if printer.extruder.temperature >= temp %}
                INFO_LOG MSG="EXTRUDE_MORE: Extruding {purge_len}mm from T0 at {printer.extruder.temperature|int}°C"
                M83
                G92 E0
                G1.1 E{purge_len} F{purge_speed}
                M400
                G1.1 E-2 F300
                M400
                G92 E0
            {% else %}
                WARN_LOG MSG="EXTRUDE_MORE: T0 at {printer.extruder.temperature|int}°C — below target {temp|int}°C — skipping"
            {% endif %}
        {% endif %}

        # --- Both: switch back to T1 ---
        {% if t == 2 %}
            _IDEX_DECOUPLE
            SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
            ACTIVATE_EXTRUDER EXTRUDER=extruder1
            SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
            G92 E0
        {% endif %}

        # --- T1 only or Both: extrude from T1 ---
        {% if t == 1 or t == 2 %}
            {% if printer.extruder1.temperature >= temp %}
                INFO_LOG MSG="EXTRUDE_MORE: Extruding {purge_len}mm from T1 at {printer.extruder1.temperature|int}°C"
                M83
                G92 E0
                G1.1 E{purge_len} F{purge_speed}
                M400
                G1.1 E-2 F300
                M400
                G92 E0
            {% else %}
                WARN_LOG MSG="EXTRUDE_MORE: T1 at {printer.extruder1.temperature|int}°C — below target {temp|int}°C — skipping"
            {% endif %}
        {% endif %}

    {% endif %}
