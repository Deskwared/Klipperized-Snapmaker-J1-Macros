#######################################
# PAUSE / SUMMARY
#
# PAUSE:
# 1. Decouples IDEX mode if COPY/MIRROR (save mode)
# 2. Retracts E-2mm to prevent oozing
# 3. Z clearance +10mm (relative, capped at Z max)
# 4. Park the active head 10mm from the edge
# 5. Maintains hotend + bed at temperature
#
# SUMMARY:
# 1. Restores XY position and IDEX mode
# 2. Reinjects the retracted filament (anti-blob)
# 3. Resumes printing
#
# Works in PRIMARY mode (T0 or T1) and COPY/MIRROR mode
########################################

[pause_resume]

[gcode_macro _PAUSE_STATE]
# Stores machine state at pause time for RESUME
variable_x:           0.0
variable_y:           0.0
variable_z:           0.0
variable_e:           0.0
variable_speed:    6000
variable_extruder:  'extruder'
variable_idex_mode: 'PRIMARY'
variable_t0_temp:     0.0
variable_t1_temp:     0.0
variable_fan_left:    0.0
variable_fan_right:   0.0
gcode:
    # no-op — state storage only


[gcode_macro PAUSE]
description: Print pause — retract, Z clearance, park BOTH heads, temperature maintenance
rename_existing: PAUSE_BASE
gcode:
    PAUSE_BASE

    {% set retract_len = 2.0 %}
    {% set z_hop = 10 %}
    {% set z_max = printer.configfile.settings.stepper_z.position_max|float %}
    {% set current_ext = printer.toolhead.extruder %}
    {% set idex_mode = printer.dual_carriage.carriage_1|default('PRIMARY') %}
    {% set x_min = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|default(0)|float|abs %}

    # Save state
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=extruder  VALUE='"{current_ext}"'
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=idex_mode VALUE='"{idex_mode}"'
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=fan_left  VALUE={printer["fan_generic left_part_fan"].speed}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=fan_right VALUE={printer["fan_generic right_part_fan"].speed}

    IMP_LOG MSG="PAUSE — mode={idex_mode} extruder={current_ext}"

    # ── Step 1: Retract on active extruder, then Z hop ──
    G91
    G1.1 E-{retract_len} F300
    {% set z_safe = [printer.toolhead.position.z + z_hop, z_max - 5] | min %}
    G90
    G1.1 Z{z_safe} F600

    # ── Step 2: Immediately park the ACTIVE nozzle before anything else ──
    # This gets the nozzle off the print as fast as possible
    {% if current_ext == 'extruder' %}
        G1.1 X{x_min} Y5 F12000
    {% else %}
        G1.1 X{x_max - t1_x_off - 1} Y5 F12000
    {% endif %}

    # ── Step 3: Fully decouple and clear offsets ──
    _IDEX_DECOUPLE
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # ── Step 4: Park the INACTIVE nozzle ──
    # Active nozzle is already parked — now park the other one
    {% if current_ext == 'extruder' %}
        # T0 was active and is parked — now park T1
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        G1.1 X{x_max - t1_x_off - 1} Y5 F12000
    {% else %}
        # T1 was active and is parked — now park T0
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        G1.1 X{x_min} Y5 F12000
    {% endif %}

    # ── Step 5: Restore active extruder context for RESUME ──
    ACTIVATE_EXTRUDER EXTRUDER={current_ext}
    SET_DUAL_CARRIAGE CARRIAGE={0 if current_ext == 'extruder' else 1} MODE=PRIMARY

    # ── Step 6: Cut layer fans ──
    SET_FAN_SPEED FAN=left_part_fan  SPEED=0
    SET_FAN_SPEED FAN=right_part_fan SPEED=0

    DBG_LOG MSG="Temperatures maintained — T0={printer['gcode_macro _J1_RUNTIME_STATE'].left_temp}°C T1={printer['gcode_macro _J1_RUNTIME_STATE'].right_temp}°C"
    IMP_LOG MSG="Printing paused — both heads parked — Press RESUME to continue"

[gcode_macro RESUME]
description: Resume print after a pause
rename_existing: RESUME_BASE
gcode:
    {% set state      = printer["gcode_macro _PAUSE_STATE"] %}
    {% set retract_len = 2.0 %}

    IMP_LOG MSG="RESUME — returning to print, mode={state.idex_mode}"

    # 1. Rearm the filament sensor
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered VALUE=0
    FILAMENT_RESET_COUNTERS
    M412 S1

    # 2. Restore layer fans
    SET_FAN_SPEED FAN=left_part_fan  SPEED={state.fan_left}
    SET_FAN_SPEED FAN=right_part_fan SPEED={state.fan_right}

    # 3. Restore active extruder
    ACTIVATE_EXTRUDER EXTRUDER={state.extruder}
    SET_DUAL_CARRIAGE CARRIAGE={0 if state.extruder == 'extruder' else 1} MODE=PRIMARY

    # 4. Reapply the correct Z offset for the active extruder
    #    This is critical — PAUSE cleared offsets, RESUME_BASE uses the
    #    saved position which assumes offsets are active
    {% if state.extruder == 'extruder' %}
        SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    {% else %}
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
    {% endif %}

    # 5. Restore IDEX mode BEFORE moving back
    {% if state.idex_mode == 'COPY' %}
        DBG_LOG MSG="Restoring COPY mode"
        IDEX_COPY
    {% elif state.idex_mode == 'MIRROR' %}
        DBG_LOG MSG="Restoring MIRROR mode"
        IDEX_MIRROR
    {% endif %}

    # 6. Reinject the retracted filament
    G91
    G1.1 E{retract_len} F300
    G90

    # 7. Return to print position at correct Z height
    RESUME_BASE

    IMP_LOG MSG="Print resumed"

[gcode_macro CANCEL_PRINT]
description: Cancel print
rename_existing: CANCEL_PRINT_BASE
gcode:
    IMP_LOG MSG="Cancelling print"
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=0
    
    # Actually clear the buffer logic so it physically stops feeding new G-code
    CLEAR_PAUSE
    
    # Drop bed 10mm safely before moving heads
    {% if 'z' in printer.toolhead.homed_axes %}
        {% set z_safe = [printer.toolhead.position.z + 10, printer.configfile.settings.stepper_z.position_max - 5] | min %}
        G90
        G1.1 Z{z_safe} F600
    {% endif %}
    
    _IDEX_DECOUPLE
    G91
    G90
    TURN_OFF_HEATERS
    SET_FAN_SPEED FAN=left_part_fan  SPEED=0
    SET_FAN_SPEED FAN=right_part_fan SPEED=0
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G28
    {% set current_ext = printer.toolhead.extruder %}
    {% set x_min = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|default(0)|float|abs %}
    {% set park_t1 = x_max - t1_x_off - 1 %}

    # Park the last-used active head FIRST
    {% if current_ext == 'extruder' %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        G1.1 X{x_min} F12000
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        G1.1 X{park_t1} F12000
    {% else %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        G1.1 X{park_t1} F12000
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        G1.1 X{x_min} F12000
    {% endif %}
    # Return to T0 for a clean state
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    RESET_RUNTIME_STATE
    FILAMENT_STATUS
    M412 S0
    
    # Throw the core kill switch
    CANCEL_PRINT_BASE
    
    IMP_LOG MSG="Print cancelled"

########################################
# START / END PRINT
########################################

[gcode_macro START_PRINT]
description: Print start macro — heat, home, IDEX mode selection based on plate name
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set T0_TEMP_RAW  = params.T0_TEMP|default(0)|float %}
    {% set T1_TEMP_RAW  = params.T1_TEMP|default(0)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(0)|float %}
    {% set START_EXTRUDER = params.START_EXTRUDER|default(0)|int %}
    {% set PLATE    = params.PLATE|default('')|string|lower %}
    {% set SPACING  = params.SPACING|default(165)|float %}
    {% set MAX_X    = params.MAX_X|default(0)|float %}

    # Reload Z offsets from variables.cfg before anything else ──
    # Ensures manual_z_offset or z_offset_t0/t1 are current in memory regardless of what happened during this startup session
    Z_OFFSET

    # ------------------------------------------------------------------
    # PRE-PRINT SAFETY CHECKS FOR IDEX MODES
    # ------------------------------------------------------------------
    {% if MAX_X > 0 %}
        {% set x_max_limit = printer.configfile.settings.dual_carriage.position_max %}
        {% set x_min_limit = printer.configfile.settings.stepper_x.position_min %}
        {% set safe_dist = printer.configfile.settings.dual_carriage.safe_distance|default(0)|float %}
        
        {% if 'mirror' in PLATE %}
            {% set allowed_max = (x_max_limit + x_min_limit - safe_dist) / 2.0 %}
            {% if MAX_X > allowed_max %}
                { action_raise_error("MIRROR MODE ABORT: Model is too far right (MAX_X=" ~ MAX_X ~ "). Move the model to the LEFT side of the bed in your slicer (Max allowed X is " ~ allowed_max ~ "mm)!") }
            {% endif %}
        {% elif 'copy' in PLATE %}
            {% set allowed_max = x_max_limit - SPACING %}
            {% if MAX_X > allowed_max %}
                { action_raise_error("COPY MODE ABORT: Model is too far right (MAX_X=" ~ MAX_X ~ "). Move the model to the LEFT side of the bed in your slicer (Max allowed X is " ~ allowed_max ~ "mm)!") }
            {% endif %}
        {% endif %}
    {% endif %}
    # ------------------------------------------------------------------

    # Provide fallback mapping if the slicer uses generic EXTRUDER_TEMP instead of specific T0/T1_TEMPs
    {% set T0_TEMP = T0_TEMP_RAW %}
    {% set T1_TEMP = T1_TEMP_RAW %}
    
    {% if T0_TEMP == 0 and T1_TEMP == 0 and EXTRUDER_TEMP > 0 %}
        {% if START_EXTRUDER == 0 %}
            {% set T0_TEMP = EXTRUDER_TEMP %}
        {% elif START_EXTRUDER == 1 %}
            {% set T1_TEMP = EXTRUDER_TEMP %}
        {% endif %}
    {% endif %}
    
    # Final fallback: Never kill actively pre-heated nozzles if the slicer sent native M104 commands before START_PRINT
    {% if T0_TEMP == 0 and printer.extruder.target > 0 %}
        {% set T0_TEMP = printer.extruder.target %}
    {% endif %}
    {% if T1_TEMP == 0 and printer.extruder1.target > 0 %}
        {% set T1_TEMP = printer.extruder1.target %}
    {% endif %}

    # Print mode detection
    {% set use_t0 = (T0_TEMP > 0) %}
    {% set use_t1 = (T1_TEMP > 0) %}
    {% set DUAL   = (use_t0 and use_t1) or ('copy' in PLATE) or ('mirror' in PLATE) %}

    # Full reset
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=0
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Memorize target temperatures
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp  VALUE={T0_TEMP}
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={T1_TEMP}

    # Preheating — only the heads in use
    {% if use_t0 %}
        M104.1 S{T0_TEMP} T0
    {% else %}
        M104.1 S0 T0
    {% endif %}
    {% if use_t1 %}
        M104.1 S{T1_TEMP} T1
    {% else %}
        M104.1 S0 T1
    {% endif %}
    M140 S{BED_TEMP}

    # Full homing
    G28
    G90
    # Lower Z immediately — after homing Z is at 205mm (top endstop)
    G1.1 Z30 F600
    M83
    G92 E0

    # Wait for temperatures — only the heads in use
    M190 S{BED_TEMP}
    {% if use_t0 %}
        _SWITCH_TO_EXTRUDER NAME=extruder AUTOPARK=0
        M109.1 S{T0_TEMP}
    {% endif %}
    {% if use_t1 and DUAL %}
        M109.1 S{T1_TEMP} T1
    {% elif use_t1 and not use_t0 %}
        _SWITCH_TO_EXTRUDER NAME=extruder1 AUTOPARK=0
        M109.1 S{T1_TEMP} T1
    {% endif %}

    # Homing complete
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=1

    # IDEX mode selection
    {% if 'copy' in PLATE %}
        IMP_LOG MSG="COPY Mode — plate={PLATE} spacing={SPACING}mm"
        IDEX_COPY SPACING={SPACING}
    {% elif 'mirror' in PLATE %}
        IMP_LOG MSG="MIRROR Mode — plate={PLATE}"
        IDEX_MIRROR
    {% elif use_t0 %}
        IMP_LOG MSG="PRIMARY T0 Mode — plate={PLATE}"
        _SWITCH_TO_EXTRUDER NAME=extruder AUTOPARK=0
    {% elif use_t1 %}
        IMP_LOG MSG="PRIMARY T1 Mode — plate={PLATE}"
        _SWITCH_TO_EXTRUDER NAME=extruder1 AUTOPARK=0
    {% endif %}

    # Reset counters to zero for each print
    FILAMENT_RESET_COUNTERS
    # Ensure the sensor is explicitly activated
    M412 S1

    IMP_LOG MSG="Print started — T0={T0_TEMP}°C T1={T1_TEMP}°C Bed={BED_TEMP}°C"

[gcode_macro END_PRINT]
gcode:
    _IDEX_DECOUPLE

    # ── Retract only if the active nozzle is hot enough to extrude ──
    {% set min_extrude_temp = printer.configfile.settings.extruder.min_extrude_temp|default(170)|float %}
    {% if printer.toolhead.extruder == 'extruder' %}
        {% set active_temp = printer.extruder.temperature %}
    {% else %}
        {% set active_temp = printer.extruder1.temperature %}
    {% endif %}
    {% if active_temp >= min_extrude_temp %}
        G91
        G1.1 E-2 F300
        G90
    {% endif %}

    TURN_OFF_HEATERS
  
    SET_FAN_SPEED FAN=left_part_fan SPEED=0
    SET_FAN_SPEED FAN=right_part_fan SPEED=0
    {% set z_safe = [printer.toolhead.position.z + 10, printer.configfile.settings.stepper_z.position_max - 5] | min %}
    G1.1 Z{z_safe} F600
    
    {% set current_ext = printer.toolhead.extruder %}
    {% set x_min = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|default(0)|float|abs %}
    {% set park_t1 = x_max - t1_x_off - 1 %}

    # Park the last-used active head FIRST to prevent oozing
    {% if current_ext == 'extruder' %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        G1.1 X{x_min} F12000
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        G1.1 X{park_t1} F12000
    {% else %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        G1.1 X{park_t1} F12000
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        G1.1 X{x_min} F12000
    {% endif %}
    
    # Reset offset before home to avoid out-of-range
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    
    # Finally, slowly Home Y and Z to present the bed to the user
    G28 Y Z
    # Return to T0 for a clean state
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    RESET_RUNTIME_STATE
    IMP_LOG MSG="Print complete"
    FILAMENT_STATUS
