########################################
# IDEX — COPY / MIRROR / PRIMARY MODES
########################################

[gcode_macro IDEX_COPY]
description: Activates COPY mode — both heads print the same part side-by-side
gcode:
    {% set spacing = params.SPACING|default(165)|float %}
    {% set x_min   = printer.configfile.settings.stepper_x.position_min %}

    # Do not use ACTIVATE_EXTRUDER during positioning or after activating COPY/MIRROR —
    # this breaks carriage synchronization. SET_DUAL_CARRIAGE alone is sufficient.

    # Step 1: Clean decoupling
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Step 2: T0 to X_min (reference position)
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G90
    G1.1 X{x_min} F6000

    # Step 3: T1 to X_min + spacing
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1.1 X{x_min + spacing} F6000

    # Step 4: Re-assert C0 as the active PRIMARY before switching C1 to COPY.
    # Klipper raises "Must activate another carriage as PRIMARY first" if the
    # carriage being set to COPY/MIRROR is itself the currently active PRIMARY.
    # After Step 3, C1 is the active carriage — this re-assertion prevents that error.
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY

    # Step 5: Activate COPY — calculated offset = spacing
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

    # Step 6: Apply Z offset AFTER activating COPY
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0

    INFO_LOG MSG="COPY mode active — spacing={spacing}mm"

[gcode_macro IDEX_MIRROR]
description: Activates MIRROR mode — both heads print in symmetry relative to the bed center
gcode:
    {% set x_min = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    # Axis of symmetry = bed center
    # T0 starts from X_min, T1 starts from X_max
    # When T0 moves +N, T1 moves -N → perfect symmetry

    # Step 1: Clean decoupling
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Step 2: T0 to X_min (left starting position)
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G90
    G1.1 X{x_min} F6000

    # Step 3: T1 to X_max (right starting position)
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1.1 X{x_max} F6000

    # Step 4: Re-assert C0 as the active PRIMARY before switching C1 to MIRROR.
    # Same Klipper constraint as COPY — C1 is still active after Step 3.
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY

    # Step 5: Activate MIRROR — T1 moves in opposite direction of T0
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

    # Step 6: Apply Z offset after activation
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0

    INFO_LOG MSG="MIRROR mode active — T0=X{x_min} T1=X{x_max} axis={((x_max - x_min) / 2)|round(1)}mm"

[gcode_macro IDEX_PRIMARY]
description: Return to PRIMARY mode — normal printing with T0
gcode:
    _IDEX_DECOUPLE
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G92 E0
    INFO_LOG MSG="PRIMARY mode active"

########################################
# IDEX — BACKUP MODE
#
# Allows an IDEX printer to automatically continue a print on the backup
# extruder when the primary extruder runs out of filament.
#
# Usage: call IDEX_BACKUP (optionally with BACKUP=0 to make T0 the backup)
# from START_PRINT after heating, before printing begins.
#
# When the filament sensor detects a runout on the primary extruder it calls
# _BACKUP_SWITCH instead of PAUSE.  _BACKUP_SWITCH parks the dead carriage,
# heats the backup nozzle to full print temperature, returns to the last
# known XYZ print position, re-arms the sensor, and continues printing.
#
# If the backup extruder also runs out, _BACKUP_SWITCH calls PAUSE normally.
#
# Backup mode is only meaningful in PRIMARY/IDEX mode.  In COPY or MIRROR
# mode the filament sensor always calls PAUSE directly (both carriages extrude
# the same model; switching to one nozzle mid-print would leave an incomplete
# part on the other side).
########################################

[gcode_macro _BACKUP_STATE]
description: Internal state storage for backup extruder mode — do not call directly
variable_enabled:  0        # 1 = backup mode armed
variable_primary:  'extruder'
variable_backup:   'extruder1'
variable_switched: 0        # 1 = switch already executed (prevents double-trigger)
gcode:
    # Storage macro only — no direct action

[gcode_macro IDEX_BACKUP]
description: Arm backup extruder mode. BACKUP=1 (default) makes T1 the backup; BACKUP=0 makes T0 the backup.
gcode:
    {% set backup_idx   = params.BACKUP|default(1)|int %}
    {% set primary_name = 'extruder'  if backup_idx == 1 else 'extruder1' %}
    {% set backup_name  = 'extruder1' if backup_idx == 1 else 'extruder' %}

    # Read the current full print temperature for the primary extruder.
    # _J1_RUNTIME_STATE is populated by the M104/M109 overrides in this file.
    {% set primary_temp = printer["gcode_macro _J1_RUNTIME_STATE"].left_temp
                          if primary_name == 'extruder'
                          else printer["gcode_macro _J1_RUNTIME_STATE"].right_temp %}

    SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=enabled  VALUE=1
    SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=primary  VALUE='"{primary_name}"'
    SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=backup   VALUE='"{backup_name}"'
    SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=switched VALUE=0

    # Drop backup nozzle to standby temperature (primary − 70°C, minimum 0°C).
    # This keeps the backup ready to extrude quickly without oozing while idle.
    # We store the FULL target temperature back into _J1_RUNTIME_STATE for the
    # backup extruder so _SWITCH_TO_EXTRUDER's Step 6 heats to the correct temp
    # when the switch fires.
    {% set standby_temp = [primary_temp - 70, 0]|max %}
    {% if backup_name == 'extruder1' %}
        M104.1 S{standby_temp} T1
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={primary_temp}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_part_fan VALUE={printer["gcode_macro _J1_RUNTIME_STATE"].left_part_fan}
    {% else %}
        M104.1 S{standby_temp} T0
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={primary_temp}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_part_fan VALUE={printer["gcode_macro _J1_RUNTIME_STATE"].right_part_fan}
    {% endif %}

    INFO_LOG MSG="BACKUP mode armed — primary={primary_name} backup={backup_name} standby={standby_temp}°C (full={primary_temp}°C)"

[gcode_macro _BACKUP_SWITCH]
description: Internal — switch to backup extruder after primary filament runout. Called by filament sensor.
gcode:
    {% set state = printer["gcode_macro _BACKUP_STATE"] %}

    {% if state.switched == 0 %}
        SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=switched VALUE=1
        INFO_LOG MSG="BACKUP: runout on {state.primary} — switching to {state.backup}"

        # Save current gcode-space position BEFORE any carriage motion.
        # gcode_move.gcode_position is post-offset, so these values are valid
        # in the new extruder's coordinate frame once offsets are applied.
        {% set save_x = printer.gcode_move.gcode_position.x %}
        {% set save_y = printer.gcode_move.gcode_position.y %}
        {% set save_z = printer.gcode_move.gcode_position.z %}

        # Shut down the dead primary extruder NOW, before switching to the backup.
        # Cooling starts immediately during the backup nozzle's heat-up wait
        # (_SWITCH_TO_EXTRUDER Step 6 blocks on M109.1 which can take 1-2 min).
        # M104.1 is the renamed builtin — bypasses our M104 override intentionally.
        # Also zero the dead extruder's stored temp so M106's dual-head fan logic
        # does not continue running the dead side's cooling fan after the switch.
        {% if state.primary == 'extruder' %}
            M104.1 S0 T0
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE=0
        {% else %}
            M104.1 S0 T1
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE=0
        {% endif %}

        # Switch to the backup carriage. This calls _SWITCH_TO_EXTRUDER with
        # AUTOPARK=1 (default), which:
        #   - Parks the dead primary carriage at its home edge
        #   - Applies target offsets for the backup extruder
        #   - Activates the backup extruder and carriage
        #   - Restores fan speed
        #   - Waits for the backup nozzle to reach full print temperature
        #     (using the value stored in _J1_RUNTIME_STATE by IDEX_BACKUP)
        # NOTE: save_z is captured before this call, so any Z motion during
        # parking does not corrupt the saved print height.
        {% if state.backup == 'extruder1' %}
            T1
        {% else %}
            T0
        {% endif %}

        # Return to the saved print position.
        # Z first at slow feed to avoid dragging nozzle across the model,
        # then XY to re-position precisely over the last print coordinate.
        G90
        G1.1 Z{save_z} F600
        G1.1 X{save_x} Y{save_y} F6000

        # Re-arm the filament sensor on the new extruder and disable backup
        # mode so a subsequent runout on the backup nozzle falls through to PAUSE.
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered    VALUE=0
        SET_GCODE_VARIABLE MACRO=_BACKUP_STATE  VARIABLE=enabled      VALUE=0
        FILAMENT_RESET_COUNTERS

        INFO_LOG MSG="BACKUP: printing with {state.backup} — returned to X={save_x} Y={save_y} Z={save_z}"

    {% else %}
        # Backup extruder has also run out — no recovery possible.
        INFO_LOG MSG="BACKUP: runout on backup extruder too — pausing"
        PAUSE
    {% endif %}

########################################
# IDEX — INTERNAL MACROS
########################################

[gcode_macro _IDEX_DECOUPLE]
description: Decouples both carriages into independent PRIMARY mode
gcode:
    {% if printer["gcode_macro _J1_CONFIG"].debug %}
        INFO_LOG MSG="IDEX Decoupling"
    {% endif %}
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder  MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
    # Finish on the currently active carriage to avoid changing movement context
    {% if printer.toolhead.extruder == 'extruder' %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    {% else %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    {% endif %}

[gcode_macro _SWITCH_TO_EXTRUDER]
description: Internal extruder switch macro (used by T0/T1)
gcode:
    {% set name = params.NAME %}
    {% set is_t0 = (name == 'extruder') %}
    {% set autopark = params.AUTOPARK|default(1)|int %}
    {% set current = printer.toolhead.extruder %}

    # Skip switch if target extruder is already active, or if COPY/MIRROR is active during a print.
    # Prevents slicer-injected T0/T1 commands from decoupling carriages mid-print.
    {% set dc = printer.dual_carriage %}
    {% set is_coupled = (dc is defined and dc.mode|default(dc.carriage_1|default('PRIMARY')) in ['COPY', 'MIRROR']) %}
    
    {% if (current == name or is_coupled) and printer["gcode_macro _HOMED"].ready == 1 %}
        {% if printer["gcode_macro _J1_CONFIG"].debug %}
            INFO_LOG MSG="Switch ignored — target={name} active={current} coupled={is_coupled}"
        {% endif %}
        # Reset E to neutralize any E offset accumulated by Orca
        G92 E0
    {% else %}

        # STEP 1: Park the SOURCE carriage first, BEFORE decoupling — movement context is still consistent
        {% if autopark == 1 and 'z' in printer.toolhead.homed_axes %}
            {% if 'x' not in printer.toolhead.homed_axes %}
                G28 X
            {% endif %}
            G90
            {% if current == 'extruder' %}
            G1.1 X{printer.configfile.settings.stepper_x.position_min} F18000
                {% if printer["gcode_macro _J1_CONFIG"].debug %}
                    INFO_LOG MSG="Park source T0 → X={printer.configfile.settings.stepper_x.position_min}"
                {% endif %}
            {% else %}
                {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|default(0)|float|abs %}
                {% set park_t1 = printer.configfile.settings.dual_carriage.position_max - t1_x_off - 1 %}
                G1.1 X{park_t1} F18000
                {% if printer["gcode_macro _J1_CONFIG"].debug %}
                    INFO_LOG MSG="Park source T1 → X={park_t1}"
                {% endif %}
            {% endif %}
        {% elif autopark == 1 %}
            WARN_LOG MSG="Park ignored — Z not homed"
        {% endif %}

        # STEP 2: Turn off source fan, then IDEX Decoupling
        {% set source_fan = "left_part_fan" if current == "extruder" else "right_part_fan" %}
        SET_FAN_SPEED FAN={source_fan} SPEED=0
        _IDEX_DECOUPLE

        # STEP 3: Apply target offsets
        # In COPY/MIRROR mode, T1 uses T0's Z offset to keep both heads at the same level
        {% if is_t0 %}
            SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
        {% elif printer.dual_carriage is defined and printer.dual_carriage.carriage_1|default('PRIMARY') in ['COPY', 'MIRROR'] %}
            SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
            {% if printer["gcode_macro _J1_CONFIG"].debug %}
                INFO_LOG MSG="Mode {printer.dual_carriage.carriage_1|default('PRIMARY')} — T0 Z offset applied to T1"
            {% endif %}
        {% else %}
            SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
        {% endif %}

        # STEP 4: Activate target extruder and carriage
        ACTIVATE_EXTRUDER EXTRUDER={name}
        SET_DUAL_CARRIAGE CARRIAGE={0 if is_t0 else 1} MODE=PRIMARY

        # STEP 5: Restore target fan speed and reset E
        {% set target_fan = "left_part_fan" if is_t0 else "right_part_fan" %}
        {% set target_fan_speed = printer["gcode_macro _J1_RUNTIME_STATE"].left_part_fan if is_t0 else printer["gcode_macro _J1_RUNTIME_STATE"].right_part_fan %}
        SET_FAN_SPEED FAN={target_fan} SPEED={target_fan_speed}
        G92 E0

        # STEP 6: Wait for temperature if necessary
        {% set target_temp = printer["gcode_macro _J1_RUNTIME_STATE"].left_temp if is_t0 else printer["gcode_macro _J1_RUNTIME_STATE"].right_temp %}
        {% if target_temp > 0 %}
            M109.1 S{target_temp}
        {% endif %}

        # STEP 7: Force a safe feedrate before returning to slicer gcode —
        # prevents violent moves if a high F is inherited from the print
        G1.1 F3000

        {% if printer["gcode_macro _J1_CONFIG"].debug %}
            INFO_LOG MSG="Switch OK — active={name}"
        {% endif %}
    {% endif %}

########################################
# RUNTIME STATE
# Stores temperatures and fans to recover them during T0/T1 switches
########################################

[gcode_macro _J1_RUNTIME_STATE]
variable_left_part_fan: 0
variable_right_part_fan: 0
variable_left_temp: -1
variable_right_temp: -1
gcode:
    # no-op

[gcode_macro RESET_RUNTIME_STATE]
description: Resets runtime state (fans, stored temperatures)
gcode:
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_part_fan  VALUE=0
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_part_fan VALUE=0
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp      VALUE=-1
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp     VALUE=-1
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=0

########################################
# T0 / T1
########################################
[gcode_macro T0]
gcode:
    _SWITCH_TO_EXTRUDER NAME=extruder AUTOPARK={params.AUTOPARK|default(1)|int}

[gcode_macro T1]
gcode:
    _SWITCH_TO_EXTRUDER NAME=extruder1 AUTOPARK={params.AUTOPARK|default(1)|int}

[gcode_macro SELECT_T0]
description: Switch to T0 in manual jogging mode
gcode:
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0
    SET_RIGHT_ADJUSTMENTS OP=reset
    M117 T0 Manual Jogging Active

[gcode_macro SELECT_T1]
description: Switch to T1 in manual jogging mode
gcode:
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_DUAL_CARRIAGE CARRIAGE=1
    SET_RIGHT_ADJUSTMENTS OP=apply
    M117 T1 Manual Jogging Active

[gcode_macro PARK_LEFT_EXTRUDER]
description: Park T0 on the Left
gcode:
    {% set x_min    = printer.configfile.settings.stepper_x.position_min %}
    
    # FULL reset of offsets BEFORE any decoupling
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Clean decoupling
    _IDEX_DECOUPLE

    # --- Park T0 on the left ---
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0
    G1.1 X{x_min} F18000

    INFO_LOG MSG="T0 parked"

[gcode_macro PARK_RIGHT_EXTRUDER]
description: Park T1 on the Right
gcode:
    {% set x_min    = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max    = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|abs %}
    {% set park_x   = x_max - t1_x_off - 1 %}

    # FULL reset of offsets BEFORE any decoupling
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Clean decoupling
    _IDEX_DECOUPLE

    # --- Park T1 on the right ---
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G90

    # DEBUG — show real values
    INFO_LOG MSG="PARK T1: x_max={x_max} t1_x_off={t1_x_off} park_x={park_x}"
    INFO_LOG MSG="Current GCODE_OFFSET: X={printer.gcode_move.homing_origin.x} Y={printer.gcode_move.homing_origin.y} Z={printer.gcode_move.homing_origin.z}"

    G1.1 X{park_x} F18000

    INFO_LOG MSG="T1 parked"


########################################
# M104 / M109 / M106 / M107 OVERRIDES
########################################

[gcode_macro M104]
rename_existing: M104.1
description: Overrides M104 with temperature storage in _J1_RUNTIME_STATE
gcode:
    {% set s = params.S|default(0)|float %}
    {% set t = params.T|int if params.T is defined else (1 if printer.toolhead.extruder == 'extruder1' else 0) %}
    {% if printer.dual_carriage is defined and printer.dual_carriage.carriage_1|default('PRIMARY') in ['COPY', 'MIRROR'] %}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={s}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={s}
        M104.1 S{s} T0
        M104.1 S{s} T1
    {% else %}
        {% if t == 0 %}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={s}
        {% else %}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={s}
        {% endif %}
        M104.1 S{s} T{t}
    {% endif %}

[gcode_macro M109]
rename_existing: M109.1
description: Overrides M109 with temperature storage in _J1_RUNTIME_STATE
gcode:
    {% set s = params.S|default(0)|float %}
    {% set t = params.T|int if params.T is defined else (1 if printer.toolhead.extruder == 'extruder1' else 0) %}
    {% if printer.dual_carriage is defined and printer.dual_carriage.carriage_1|default('PRIMARY') in ['COPY', 'MIRROR'] %}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={s}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={s}
        M109.1 S{s} T0
        M109.1 S{s} T1
    {% else %}
        {% if t == 0 %}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={s}
        {% else %}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={s}
        {% endif %}
        M109.1 S{s} T{t}
    {% endif %}

[gcode_macro M106]
description: Overrides M106 — handles COPY/MIRROR modes and active fan in PRIMARY mode
gcode:
    {% set s = params.S|default(255)|float %}
    {% set speed = s / 255.0 %}
    {% if printer.dual_carriage is defined and printer.dual_carriage.carriage_1|default('PRIMARY') in ['COPY', 'MIRROR'] %}
        # COPY/MIRROR: both carriages extrude together — both fans run at the same speed
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_part_fan  VALUE={speed}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_part_fan VALUE={speed}
        SET_FAN_SPEED FAN=left_part_fan  SPEED={speed}
        SET_FAN_SPEED FAN=right_part_fan SPEED={speed}
    {% else %}
        # PRIMARY mode: fan both nozzles if both have an active target temperature
        # (dual-tool IDEX print). Fan only the active nozzle for single-extruder prints.
        {% set l_temp = printer["gcode_macro _J1_RUNTIME_STATE"].left_temp %}
        {% set r_temp = printer["gcode_macro _J1_RUNTIME_STATE"].right_temp %}
        {% if l_temp > 0 and r_temp > 0 %}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_part_fan  VALUE={speed}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_part_fan VALUE={speed}
            SET_FAN_SPEED FAN=left_part_fan  SPEED={speed}
            SET_FAN_SPEED FAN=right_part_fan SPEED={speed}
        {% else %}
            {% set fan = "left_part_fan" if printer.toolhead.extruder == "extruder" else "right_part_fan" %}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE={fan} VALUE={speed}
            SET_FAN_SPEED FAN={fan} SPEED={speed}
        {% endif %}
    {% endif %}

[gcode_macro M107]
description: Overrides M107 — turns off the active layer fan
gcode:
    M106 S0
