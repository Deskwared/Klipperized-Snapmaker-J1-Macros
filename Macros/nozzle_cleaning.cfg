########################################
# NOZZLE CLEANING
# Places T0 slightly left of center and T1 slightly right without collision risk, heats both nozzles for manual cleaning
########################################

[gcode_macro CALIBRATIONS_PREP]
description: Unified macro to home printer, heat bed/nozzles, and setup dual-carriages for manual brushing before running automated routines
gcode:
    {% set bed_temp = 60.0 %}
    {% set hotend_temp = 200.0 %}
    {% set travel_speed = 50.0 %}
    
    RESPOND MSG="=== IDEX Global Probe Prep Initiated ==="
    M117 Heating and Homing...

    # Homing Check
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    G90
    
    # Pre-Heat Bed and Nozzles in parallel
    M140 S{bed_temp}
    
    # Heat T0
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    M104.1 S{hotend_temp}
    
    # Heat T1
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    M104.1 S{hotend_temp}
    
    # Wait for target temperatures synchronously
    M190 S{bed_temp}
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    M109.1 S{hotend_temp}
    
    # Establish layout for easy manual brushing
    {% set x_min = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    {% set x_center = (x_max + x_min) / 2 %}
    {% set gap = 30 %}
    
    _IDEX_DECOUPLE
    
    # Bring T1 to right-center
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G1.1 Z50 F600
    G1.1 X{x_center + gap} Y20 F{travel_speed * 60}
    
    # Bring T0 to left-center
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G1.1 X{x_center - gap} Y20 F{travel_speed * 60}
    
    # Finalize toolhead deployment state back to primary
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    
    RESPOND MSG="CRITICAL: Thoroughly brush BOTH nozzles clean of all oozed plastic. Cooled plastic will block electrical continuity!"
    RESPOND MSG="Once nozzles are perfectly clean, launch your target script: Z_CALIBRATION_AUTO_PROBE, BED_TRAMMING_AUTO_PROBE, or CALIBRATE_XY_AUTO_PROBE"
    M117 Prep OK! Clean Nozzles!

[gcode_macro NOZZLE_CLEAN]
description: Places both nozzles at bed center and heats for manual cleaning
gcode:
    {% set TEMP    = params.TEMP|default(220)|float %}
    {% set x_min   = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max   = printer.configfile.settings.dual_carriage.position_max %}
    {% set x_center = (x_max + x_min) / 2 %}
    {% set y_center = (printer.configfile.settings.stepper_y.position_max
                       + printer.configfile.settings.stepper_y.position_min) / 2 %}
    {% set gap     = 30 %}   # gap between the two nozzles in mm — adjust if needed

    # Home if necessary
    {% if 'xyz' not in printer.toolhead.homed_axes %}
       G28
    {% endif %}
    G90

    # Preheating both nozzles in parallel
    M104.1 S{TEMP} T0
    M104.1 S{TEMP} T1
    IMP_LOG MSG="Heating nozzles to {TEMP}°C..."

    # Decouple and position T0 slightly left of center
    _IDEX_DECOUPLE
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0
    G1.1 X{x_center - gap} Y{y_center} F9000

    # Position T1 slightly right of center
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t1}
    G92 E0
    G1.1 X{x_center + gap} Y{y_center} F9000

    # Set T0 back to active
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0

    # Wait for both nozzles to reach temperature
    M109.1 S{TEMP} T0
    M109.1 S{TEMP} T1

    IMP_LOG MSG="Nozzles at {TEMP}°C — ready for manual cleaning"
    IMP_LOG MSG="Run NOZZLE_CLEAN_END when finished"

[gcode_macro NOZZLE_CLEAN_END]
description: Cleaning finished — turn off nozzles and park both heads
gcode:
    {% set x_min    = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max    = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|abs %}
    {% set park_x   = x_max - t1_x_off - 1 %}

    TURN_OFF_HEATERS

    # FULL reset of offsets BEFORE any decoupling
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Clean decoupling
    _IDEX_DECOUPLE

    # --- Park T1 on the right ---
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G90

    # DEBUG — show real values
    DBG_LOG MSG="PARK T1: x_max={x_max} t1_x_off={t1_x_off} park_x={park_x}"
    DBG_LOG MSG="Current GCODE_OFFSET: X={printer.gcode_move.homing_origin.x} Y={printer.gcode_move.homing_origin.y} Z={printer.gcode_move.homing_origin.z}"

    G1.1 X{park_x} F12000

    # --- Park T0 on the left ---
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0
    G1.1 X{x_min} F12000

    IMP_LOG MSG="Cleaning complete — nozzles parked"
