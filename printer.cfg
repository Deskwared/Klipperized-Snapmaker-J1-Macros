[include mainsail.cfg]
[include hardware/*.cfg]
[include macros/*.cfg]

#[include autotune_tmc.cfg]

[gcode_arcs]

[exclude_object]

[firmware_retraction]
retract_length: 0.8          # retraction distance in mm
retract_speed: 30             # retraction speed in mm/s
unretract_extra_length: 0     # extra prime amount in mm
unretract_speed: 30           # prime speed in mm/s

[respond]

########################################
# VARIABLE PERSISTENCE
# Single [save_variables] store for the entire config.
# Holds Z offsets AND T1 XY offsets.
# probe_hardware.cfg previously had a second [save_variables]
# section pointing to idex_offsets.cfg — that has been removed.
# All SAVE_VARIABLE calls across all included files write here.
########################################
[save_variables]
filename: ~/printer_data/config/variables.cfg

[stepper_z]
position_endstop: 205
position_max: 205


[extruder]
control: pid
#pid_Kp: 17.488
#pid_Ki: 0.733
#pid_Kd: 104.270

[extruder1]
control: pid
#pid_Kp: 17.182
#pid_Ki: 0.725
#pid_Kd: 101.801

[heater_bed]
control: pid
#pid_Kp: 49.96
#pid_Ki: 4.59
#pid_Kd: 362.77

#######################################
# J1s CONFIGURATION
# Adjust right_nozzle_adjust_x/y after T1 XY calibration
########################################

[gcode_macro _J1_CONFIG]
variable_wipe_on_activate: False
variable_right_nozzle_adjust_x: -0.5
variable_right_nozzle_adjust_y: 0.6

gcode:
    # no-op

[gcode_macro SET_RIGHT_ADJUSTMENTS]
gcode:
    {% if params.OP|lower == 'reset'  %}
        RESPOND MSG="resetting offsets"
        SET_GCODE_OFFSET X=0
        SET_GCODE_OFFSET Y=0
        SET_GCODE_OFFSET Z=0
    {% elif params.OP|lower == 'apply' %}
        RESPOND MSG="applying offsets"
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|float}
        SET_GCODE_OFFSET Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y|float}
        SET_GCODE_OFFSET Z=0
    {% else %}
        RESPOND MSG="unknown op {params.OP}"
    {% endif %}

########################################
# Z OFFSETS T0 / T1
# Persisted automatically via [save_variables] in ~/variables.cfg
# The values below serve as defaults for the very first startup.
# Afterward, delayed_gcode replaces them with the saved values.
########################################
[gcode_macro Z_OFFSET]
variable_t0: -8
variable_t1: -8
gcode:
    # Reloads offsets from save_variables (useful if called manually)
    {% if printer.save_variables.variables.z_offset_t0 is defined %}
        SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t0 VALUE={printer.save_variables.variables.z_offset_t0}
    {% endif %}
    {% if printer.save_variables.variables.z_offset_t1 is defined %}
        SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t1 VALUE={printer.save_variables.variables.z_offset_t1}
    {% endif %}
    IMP_LOG MSG="Z offsets loaded — T0={printer['gcode_macro Z_OFFSET'].t0} T1={printer['gcode_macro Z_OFFSET'].t1}"

########################################
# STARTUP — RESTORE ALL PERSISTED OFFSETS
# Loads Z offsets (T0 and T1) and T1 XY offsets from variables.cfg.
# CONFLICT 3 FIX: IDEX_RESTORE_OFFSETS added here so T1 XY offsets
# are automatically re-applied on every restart, matching the same
# pattern used for Z offsets.
########################################
[delayed_gcode _LOAD_Z_OFFSETS]
initial_duration: 1
gcode:
    # ── Z offset T0 ──
    {% if printer.save_variables.variables.z_offset_t0 is defined %}
        SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t0 VALUE={printer.save_variables.variables.z_offset_t0}
        IMP_LOG MSG="Z offset T0 loaded — {printer.save_variables.variables.z_offset_t0}"
    {% else %}
        SAVE_VARIABLE VARIABLE=z_offset_t0 VALUE={printer["gcode_macro Z_OFFSET"].t0}
        IMP_LOG MSG="First start — default T0 Z offset saved ({printer['gcode_macro Z_OFFSET'].t0})"
    {% endif %}

    # ── Z offset T1 ──
    {% if printer.save_variables.variables.z_offset_t1 is defined %}
        SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t1 VALUE={printer.save_variables.variables.z_offset_t1}
        IMP_LOG MSG="Z offset T1 loaded — {printer.save_variables.variables.z_offset_t1}"
    {% else %}
        SAVE_VARIABLE VARIABLE=z_offset_t1 VALUE={printer["gcode_macro Z_OFFSET"].t1}
        IMP_LOG MSG="First start — default T1 Z offset saved ({printer['gcode_macro Z_OFFSET'].t1})"
    {% endif %}

    # ── T1 XY offsets (from IDEX datum cavity calibration) ──
    # IDEX_RESTORE_OFFSETS is defined in macros/xy_calibration.cfg
    # It checks for saved keys and applies them silently if found,
    # or logs a message if calibration has not yet been run.
    IDEX_RESTORE_OFFSETS


