###############################################################################
#  Snapmaker J1 — Filament Motion Sensor via ADC (Version divided by 100)
#  Emulation of stock firmware logic under Klipper
#
#  Sensors: optical encoders on PA4 (E0) and PA0 (E1)
#  Principle: the sensor produces an oscillating ADC signal when the filament
#             moves. If the ADC difference between two samples is too
#             low despite extrusion in progress → filament jammed/absent.
#
#  Displays:
#    - Total extruded distance per extruder (mm)
#    - Raw ADC value in real-time (scale divided by 100 for the UI)
#    - Sensor status (OK / ERROR)
#
#  FIXES:
#    - Use printer.gcode_move.gcode_position.
#      instead of printer.extruder.position (not available on J1)
#    - Automatic sensor deactivation on PAUSE trigger
#      via "triggered" flag to avoid re-detection loops
#    - Automatic reactivation on RESUME
###############################################################################

# ─────────────────────────────────────────────
# 1. ADC Reading via fake temp sensor (Scale 0.00 - 40.95)
#    The "temperature" displayed on your graphs = ADC value / 100.
# ─────────────────────────────────────────────

[adc_temperature filament_adc_map]
temperature1: 0
voltage1: 0.0
temperature2: 40.95
voltage2: 3.3

[temperature_sensor filament_e0_adc]
sensor_type: filament_adc_map
sensor_pin: PA4
adc_voltage: 3.3
min_temp: -1
max_temp: 50

[temperature_sensor filament_e1_adc]
sensor_type: filament_adc_map
sensor_pin: PA0
adc_voltage: 3.3
min_temp: -1
max_temp: 50

# ─────────────────────────────────────────────
# 2. Tracking variables and parameters
# ─────────────────────────────────────────────

[gcode_macro _FILAMENT_VARS]
description: Internal filament sensor variables
# Activation
variable_enabled: 1
# Last ADC value read
variable_last_adc_e0: 0
variable_last_adc_e1: 0
# Last extruder position read (mm)
variable_last_pos_e0: 0.0
variable_last_pos_e1: 0.0
# Total extruded distance counters (mm)
variable_total_mm_e0: 0.0
variable_total_mm_e1: 0.0
# Consecutive error counters
variable_err_count_e0: 0
variable_err_count_e1: 0
# Trigger flag (avoids re-detection loop)
variable_triggered: 0
# ── Adjustable parameters ──
# Minimum ADC difference threshold (15 = HW2 value from stock firmware)
variable_threshold: 15
# Number of consecutive errors before triggering (3 = stock firmware)
variable_max_errors: 3
# Minimum extruded distance (mm) between two checks
variable_check_distance: 2.0
gcode:
  # Storage macro, no direct action

# ─────────────────────────────────────────────
# 3. Main verification loop
# ─────────────────────────────────────────────

[delayed_gcode CHECK_FILAMENT_MOTION]
initial_duration: 5.0
gcode:
  {% set vars = printer["gcode_macro _FILAMENT_VARS"] %}
  {% if vars.enabled and not vars.triggered and printer.print_stats.state == "printing" %}
    {% set active = printer.toolhead.extruder %}

    # ── Read values and multiply by 100 to recover the raw value ──
    {% set e0_adc = (printer["temperature_sensor filament_e0_adc"].temperature * 100)|int %}
    {% set e1_adc = (printer["temperature_sensor filament_e1_adc"].temperature * 100)|int %}

    # ── Read extruder position via gcode_move (J1 fix) ──
    {% set cur_pos = printer.gcode_move.gcode_position.e|float %}

    {% if active == "extruder" %}
      {% set delta_mm = (cur_pos - vars.last_pos_e0)|abs %}
      {% set new_total = vars.total_mm_e0 + delta_mm %}
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e0 VALUE={cur_pos}
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e0 VALUE={new_total}

      # Check only if enough filament has been extruded
      {% if delta_mm >= vars.check_distance %}
        {% set diff = (e0_adc - vars.last_adc_e0)|abs %}
        {% if diff < vars.threshold %}
          {% set new_err = vars.err_count_e0 + 1 %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE={new_err}
          {% if new_err >= vars.max_errors %}
            # ── Mark as triggered BEFORE PAUSE ──
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered VALUE=1
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
            {action_respond_info("FILAMENT SENSOR: E0 jammed/absent after %.1f mm extruded!" % new_total)}
            {action_respond_info("FILAMENT SENSOR: Sensor deactivated. Change filament then RESUME.")}
            PAUSE
          {% endif %}
        {% else %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e0 VALUE={e0_adc}
      {% endif %}

    {% elif active == "extruder1" %}
      {% set delta_mm = (cur_pos - vars.last_pos_e1)|abs %}
      {% set new_total = vars.total_mm_e1 + delta_mm %}
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_pos_e1 VALUE={cur_pos}
      SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e1 VALUE={new_total}

      {% if delta_mm >= vars.check_distance %}
        {% set diff = (e1_adc - vars.last_adc_e1)|abs %}
        {% if diff < vars.threshold %}
          {% set new_err = vars.err_count_e1 + 1 %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE={new_err}
          {% if new_err >= vars.max_errors %}
            # ── Mark as triggered BEFORE PAUSE ──
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered VALUE=1
            SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
            {action_respond_info("FILAMENT SENSOR: E1 jammed/absent after %.1f mm extruded!" % new_total)}
            {action_respond_info("FILAMENT SENSOR: Sensor deactivated. Change filament then RESUME.")}
            PAUSE
          {% endif %}
        {% else %}
          SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_adc_e1 VALUE={e1_adc}
      {% endif %}
    {% endif %}
  {% endif %}
  UPDATE_DELAYED_GCODE ID=CHECK_FILAMENT_MOTION DURATION=1.0

# ─────────────────────────────────────────────
# 4. User commands
# ─────────────────────────────────────────────

[gcode_macro M412]
description: Enables/disables the filament sensor (M412 S0 or S1)
gcode:
  {% set S = params.S|default(1)|int %}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=enabled VALUE={S}
  {% if S == 1 %}
    UPDATE_DELAYED_GCODE ID=CHECK_FILAMENT_MOTION DURATION=1
    {action_respond_info("Filament sensor: ENABLED")}
  {% else %}
    UPDATE_DELAYED_GCODE ID=CHECK_FILAMENT_MOTION DURATION=0
    {action_respond_info("Filament sensor: DISABLED")}
  {% endif %}

[gcode_macro FILAMENT_STATUS]
description: Displays detailed status of filament sensors
gcode:
  {% set vars = printer["gcode_macro _FILAMENT_VARS"] %}
  
  # ── Reading and rescaling for console display ──
  {% set e0_adc = (printer["temperature_sensor filament_e0_adc"].temperature * 100)|int %}
  {% set e1_adc = (printer["temperature_sensor filament_e1_adc"].temperature * 100)|int %}
  
  {% set diff_e0 = (e0_adc - vars.last_adc_e0)|abs %}
  {% set diff_e1 = (e1_adc - vars.last_adc_e1)|abs %}
  {action_respond_info("═══ FILAMENT SENSOR STATUS ═══")}
  {action_respond_info("Sensor         : %s" % ("ENABLED" if vars.enabled else "DISABLED"))}
  {action_respond_info("Triggered      : %s" % ("YES - awaiting RESUME" if vars.triggered else "NO"))}
  {action_respond_info("─── Extruder 0 (T0) ───")}
  {action_respond_info("  Raw ADC      : %d" % e0_adc)}
  {action_respond_info("  ADC Diff     : %d (threshold: %d)" % (diff_e0, vars.threshold))}
  {action_respond_info("  Errors       : %d / %d" % (vars.err_count_e0, vars.max_errors))}
  {action_respond_info("  Total Extruded: %.1f mm" % vars.total_mm_e0)}
  {action_respond_info("─── Extruder 1 (T1) ───")}
  {action_respond_info("  Raw ADC      : %d" % e1_adc)}
  {action_respond_info("  ADC Diff     : %d (threshold: %d)" % (diff_e1, vars.threshold))}
  {action_respond_info("  Errors       : %d / %d" % (vars.err_count_e1, vars.max_errors))}
  {action_respond_info("  Total Extruded: %.1f mm" % vars.total_mm_e1)}

[gcode_macro FILAMENT_RESET_COUNTERS]
description: Resets distance counters to zero
gcode:
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e0 VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=total_mm_e1 VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e0 VALUE=0
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=err_count_e1 VALUE=0
  {action_respond_info("Filament counters reset to zero")}

[gcode_macro FILAMENT_SET_THRESHOLD]
description: Adjusts the detection threshold (FILAMENT_SET_THRESHOLD V=20)
gcode:
  {% set V = params.V|default(15)|int %}
  SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=threshold VALUE={V}
  {action_respond_info("Filament sensor threshold: %d" % V)}